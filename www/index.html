<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SlimePop">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="x-apple-disable-message-bar" content="true">
    <title>史萊姆進化大爆發 Slime Merge Pop!</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 auto;
            padding: calc(16px + var(--safe-top)) var(--safe-left) var(--safe-bottom) var(--safe-right);
        }

        #header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 10px 8px;
            text-align: center;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2px;
        }

        .header-value {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
        }

        #gameCanvas {
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            flex: 1;
            max-height: 68vh;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        #bottomBar {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
            margin-top: 10px;
        }

        .pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 14px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pill-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            box-shadow: 0 0 16px currentColor;
        }

        #msg {
            width: 100%;
            max-width: 400px;
            text-align: center;
            font-size: 13px;
            line-height: 1.35;
            color: rgba(255, 255, 255, 0.85);
            padding: 4px 2px;
            min-height: 18px;
            flex-shrink: 0;
        }

        #startOverlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.85);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 24px;
        }

        #startCard {
            background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 28px;
            padding: 26px 22px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        #startCard h1 {
            margin: 0 0 4px;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        #startCard h2 {
            margin: 0 0 18px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 0;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: #fff;
            background: linear-gradient(135deg, #e94560, #ff6b81);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.45);
            margin-bottom: 10px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        #rulesModal {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 24px;
        }

        #rulesModal.open {
            display: flex;
        }

        #rulesCard {
            background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 24px;
            padding: 22px 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.6);
        }

        #rulesCard h3 {
            margin: 0 0 12px;
            font-size: 18px;
            font-weight: 800;
        }

        #rulesCard ul {
            margin: 0;
            padding-left: 18px;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            line-height: 1.6;
        }

        #rulesCard li {
            margin-bottom: 6px;
        }

        .closeBtn {
            margin-top: 14px;
            width: 100%;
            padding: 12px 0;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script src="matter.min.js"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="header">
            <div class="header-card">
                <div class="header-label">得分</div>
                <div class="header-value" id="score">0</div>
            </div>
            <div class="header-card">
                <div class="header-label">下一隻</div>
                <div class="dot" id="nextDot"></div>
            </div>
            <div class="header-card">
                <div class="header-label">最高分</div>
                <div class="header-value" id="best">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="bottomBar">
            <div class="pill" id="rulesPill">
                <div class="pill-label">遊戲規則</div>
                <div class="dot" id="ruleDot"></div>
            </div>
            <div class="pill" id="restart" style="cursor:pointer">
                <div class="pill-label">重新開始</div>
            </div>
        </div>

        <div id="msg">按住畫面水平拖曳，鬆開投放史萊姆。</div>
    </div>

    <div id="startOverlay">
        <div id="startCard">
            <h1>SlimePop</h1>
            <h2>史萊姆進化大爆發</h2>
            <button class="btn" id="startBtn">Game Start</button>
            <button class="btn secondary" id="rulesBtn">遊戲規則</button>
        </div>
    </div>

    <div id="rulesModal">
        <div id="rulesCard">
            <h3>遊戲規則</h3>
            <ul>
                <li>按住畫面水平移動調整位置，鬆開投放史萊姆。</li>
                <li>相同等級與顏色碰撞會進化成更高等級。</li>
                <li>每次進化都可賺取積分，等級愈高分數愈高。</li>
                <li>盡量避免堆到頂部紅線，超過紅線即 Game Over。</li>
                <li>下一隻史萊姆會預覽，左上角最高分會記住。</li>
                <li>隨時可按「重新開始」重置遊戲。</li>
            </ul>
            <button class="closeBtn" id="closeRules">關閉</button>
        </div>
    </div>

    <script>
        window.onerror = function(msg, url, line) {
            var el = document.getElementById('msg');
            if (el) el.innerText = '錯誤：' + msg + ' (行 ' + line + ')';
            return true;
        };

        window.addEventListener('unhandledrejection', function(e) {
            var el = document.getElementById('msg');
            if (el) el.innerText = '未處理錯誤：' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
        });

        try {
            (function() {
                var Matter = window.Matter;
                if (!Matter) throw new Error('Matter.js 冇載入');

                var Engine = Matter.Engine,
                    Render = Matter.Render,
                    Runner = Matter.Runner,
                    Bodies = Matter.Bodies,
                    Composite = Matter.Composite,
                    Events = Matter.Events;

                var canvas = document.getElementById('gameCanvas');
                var scoreEl = document.getElementById('score');
                var bestEl = document.getElementById('best');
                var nextDot = document.getElementById('nextDot');
                var ruleDot = document.getElementById('ruleDot');
                var msgEl = document.getElementById('msg');

                var engine = Engine.create();
                var world = engine.world;
                engine.gravity.y = 1.2;

                var render = Render.create({
                    canvas: canvas,
                    engine: engine,
                    options: {
                        width: 400,
                        height: 600,
                        wireframes: false,
                        background: 'transparent',
                        pixelRatio: Math.min(window.devicePixelRatio || 1, 2)
                    }
                });
                Render.run(render);

                var runner = Runner.create();
                Runner.run(runner, engine);

                function wallOpts() {
                    return { isStatic: true, render: { fillStyle: '#0f3460' } };
                }
                var ground = Bodies.rectangle(200, 610, 420, 24, wallOpts());
                var leftWall = Bodies.rectangle(-10, 300, 24, 600, wallOpts());
                var rightWall = Bodies.rectangle(410, 300, 24, 600, wallOpts());
                Composite.add(world, [ground, leftWall, rightWall]);

                var dangerLine = Bodies.rectangle(200, 72, 400, 4, {
                    isStatic: true,
                    isSensor: true,
                    render: { visible: true, fillStyle: '#e94560' }
                });
                Composite.add(world, dangerLine);

                var score = 0;
                var best = parseInt(localStorage.getItem('slimeBest') || '0', 10);
                bestEl.innerText = best;

                var slimeTypes = [
                    { radius: 14, color: '#00f5d4', score: 2 },
                    { radius: 22, color: '#00bbf9', score: 4 },
                    { radius: 30, color: '#f15bb5', score: 8 },
                    { radius: 38, color: '#fee440', score: 16 },
                    { radius: 46, color: '#9b5de5', score: 32 },
                    { radius: 54, color: '#ff006e', score: 64 }
                ];

                var gameOver = false;
                var nextLv = 0;
                var pendingX = 200;
                var lockDrop = false;

                function getEventX(e) {
                    var rect = canvas.getBoundingClientRect();
                    var cx = 0;
                    if (e.touches && e.touches.length > 0) cx = e.touches[0].clientX;
                    else if (e.changedTouches && e.changedTouches.length > 0) cx = e.changedTouches[0].clientX;
                    else cx = e.clientX;
                    var x = ((cx - rect.left) / rect.width) * 400;
                    return Math.max(36, Math.min(364, x));
                }

                function pickNext() {
                    var lv = Math.floor(Math.random() * 3);
                    var t = slimeTypes[lv];
                    nextDot.style.backgroundColor = t.color;
                    nextDot.style.color = t.color;
                    ruleDot.style.backgroundColor = t.color;
                    ruleDot.style.color = t.color;
                    return lv;
                }

                function dropAt(x) {
                    if (gameOver) return;
                    if (lockDrop) return;
                    lockDrop = true;
                    setTimeout(function() { lockDrop = false; }, 350);

                    var type = slimeTypes[nextLv];
                    var slime = Bodies.circle(x, 40, type.radius, {
                        restitution: 0.25,
                        friction: 0.08,
                        density: 0.0018,
                        label: 'slime_' + nextLv,
                        render: {
                            fillStyle: type.color,
                            strokeStyle: 'rgba(0,0,0,0.25)',
                            lineWidth: 1
                        }
                    });
                    Composite.add(world, slime);
                    nextLv = pickNext();
                }

                function resetGame() {
                    var bodies = Composite.allBodies(world);
                    for (var i = 0; i < bodies.length; i++) {
                        if (!bodies[i].isStatic) {
                            Composite.remove(world, bodies[i]);
                        }
                    }
                    score = 0;
                    scoreEl.innerText = '0';
                    gameOver = false;
                    nextLv = pickNext();
                    msgEl.innerText = '按住畫布水平拖曳，鬆開投放史萊姆。';
                }

                // Pointer events work for both mouse and touch
                canvas.addEventListener('pointerdown', function(e) {
                    e.preventDefault();
                    canvas.setPointerCapture(e.pointerId);
                    pendingX = getEventX(e);
                });

                canvas.addEventListener('pointermove', function(e) {
                    if (e.buttons > 0) {
                        pendingX = getEventX(e);
                    }
                });

                canvas.addEventListener('pointerup', function(e) {
                    e.preventDefault();
                    dropAt(pendingX);
                });

                // Prevent scrolling on canvas only
                canvas.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
                canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

                Events.on(engine, 'collisionStart', function(event) {
                    var pairs = event.pairs;
                    var merged = {};
                    for (var i = 0; i < pairs.length; i++) {
                        var pair = pairs[i];
                        var labelA = pair.bodyA.label;
                        var labelB = pair.bodyB.label;
                        if (!labelA || !labelB) continue;
                        if (!labelA.indexOf('slime_') === 0 || !labelB.indexOf('slime_') === 0) continue;
                        if (merged[pair.bodyA.id] || merged[pair.bodyB.id]) continue;
                        if (labelA !== labelB) continue;

                        var currentLv = parseInt(labelA.split('_')[1], 10);
                        if (currentLv >= slimeTypes.length - 1) continue;

                        var nextType = slimeTypes[currentLv + 1];
                        var posX = (pair.bodyA.position.x + pair.bodyB.position.x) / 2;
                        var posY = (pair.bodyA.position.y + pair.bodyB.position.y) / 2;

                        Composite.remove(world, [pair.bodyA, pair.bodyB]);
                        merged[pair.bodyA.id] = true;
                        merged[pair.bodyB.id] = true;

                        var newSlime = Bodies.circle(posX, posY, nextType.radius, {
                            restitution: 0.3,
                            friction: 0.08,
                            density: 0.0018,
                            label: 'slime_' + (currentLv + 1),
                            render: {
                                fillStyle: nextType.color,
                                strokeStyle: 'rgba(0,0,0,0.25)',
                                lineWidth: 1
                            }
                        });
                        Composite.add(world, newSlime);

                        score += nextType.score;
                        scoreEl.innerText = score;
                    }
                });

                Events.on(engine, 'afterUpdate', function() {
                    if (gameOver) return;
                    var allBodies = Composite.allBodies(world);
                    for (var i = 0; i < allBodies.length; i++) {
                        var body = allBodies[i];
                        if (body.isStatic) continue;
                        if (body.position.y < 60 && Math.abs(body.velocity.y) < 0.8) {
                            gameOver = true;
                            msgEl.innerText = '遊戲結束！最終得分：' + score;
                            if (score > best) {
                                best = score;
                                bestEl.innerText = best;
                                localStorage.setItem('slimeBest', String(best));
                            }
                            break;
                        }
                    }
                });

                document.getElementById('startBtn').addEventListener('click', function() {
                    document.getElementById('startOverlay').style.display = 'none';
                    nextLv = pickNext();
                });

                document.getElementById('rulesBtn').addEventListener('click', function() {
                    document.getElementById('rulesModal').classList.add('open');
                });

                document.getElementById('closeRules').addEventListener('click', function() {
                    document.getElementById('rulesModal').classList.remove('open');
                });

                document.getElementById('restart').addEventListener('click', function() {
                    resetGame();
                });

                nextLv = pickNext();

                if (window.StatusBar && typeof window.StatusBar.hide === 'function') {
                    setTimeout(function() {
                        try { window.StatusBar.hide(); } catch (e) {}
                    }, 100);
                }
            })();
        } catch (e) {
            var el = document.getElementById('msg');
            if (el) el.innerText = '啟動失敗：' + e.message;
            console.error(e);
        }
    </script>
</body>
</html>
