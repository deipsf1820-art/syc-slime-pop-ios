<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f1a">
    <title>史萊姆進化大爆發 Slime Merge Pop!</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        html, body { margin:0; padding:0; background:#0f0f1a; color:#fff; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; overflow:hidden; height:100%; width:100%; position:fixed; inset:0; }
        
        #gameContainer {
            position: relative; width:100%; max-width:420px; height:100%;
            display:flex; flex-direction:column; align-items:center;
            margin:0 auto; padding: 12px 14px 24px;
        }
        
        #header {
            width:100%; display:flex; gap:6px; flex-shrink:0;
        }
        .hcard {
            flex:1; text-align:center;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            border-radius:14px;
            backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
            padding:8px 4px;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
        }
        .hlabel { font-size:10px; text-transform:uppercase; letter-spacing:0.14em; color:rgba(255,255,255,0.7); margin-bottom:3px; font-weight:700; }
        .hvalue { font-size:22px; font-weight:900; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.5); }
        .hdot { width:24px; height:24px; border-radius:50%; box-shadow:0 0 14px currentColor; }
        
        #canvasArea {
            flex:1;
            width:100%;
            display:flex; align-items:center; justify-content:center;
            min-height:0;
            margin-top:10px;
            padding: 0 4px;
        }
        
        #canvasWrap {
            position:relative;
            width:100%; max-width:400px;
            aspect-ratio: 400/600;
            max-height: 100%;
            border-radius:18px; overflow:hidden;
            box-shadow:0 10px 40px rgba(0,0,0,0.55);
        }
        
        #gameCanvas { display:block; width:100%; height:100%; background:linear-gradient(180deg,#16213e,#0f3460); border-radius:18px; }
        #touchLayer { position:absolute; inset:0; z-index:10; touch-action:none; }
        
        #bottomBar {
            width:100%; max-width:400px;
            display:flex; justify-content:space-between; gap:10px;
            flex-shrink:0; margin-top:10px;
        }
        .pill {
            background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.12);
            border-radius:12px; padding:8px 14px;
            display:flex; align-items:center; gap:7px;
            backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
        }
        .plabel { font-size:11px; color:rgba(255,255,255,0.85); letter-spacing:0.12em; text-transform:uppercase; font-weight:700; }
        
        /* FX */
        #comboBadge {
            position:absolute; left:50%; top:46%;
            transform:translate(-50%,-50%) scale(0.65);
            background:linear-gradient(135deg, rgba(255,107,129,0.96), rgba(233,69,96,0.96));
            border:2px solid rgba(255,255,255,0.4);
            border-radius:26px; padding:14px 28px; text-align:center;
            box-shadow:0 18px 56px rgba(233,69,96,0.55), 0 0 0 10px rgba(233,69,96,0.1);
            opacity:0; pointer-events:none; z-index:20;
            transition:opacity 0.12s ease, transform 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #comboBadge.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
        #comboBadge.bomb { background:linear-gradient(135deg, rgba(255,209,102,0.96), rgba(255,107,129,0.96)); box-shadow:0 18px 56px rgba(255,209,102,0.5), 0 0 0 14px rgba(255,209,102,0.12); }
        .cb-title { font-size:12px; font-weight:900; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.9); }
        .cb-main { font-size:44px; font-weight:900; color:#fff; text-shadow:0 4px 20px rgba(0,0,0,0.5); line-height:1; margin-top:2px; }
        .cb-sub { font-size:12px; font-weight:700; color:rgba(255,255,255,0.9); margin-top:3px; }
        
        #scorePop {
            position:absolute; left:50%; top:36%;
            font-size:28px; font-weight:900; color:#ffd166;
            text-shadow:0 0 22px rgba(255,209,102,0.95), 0 4px 14px rgba(0,0,0,0.7);
            pointer-events:none; z-index:25; opacity:0;
            transform:translate(-50%, 0);
            transition:opacity 0.28s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #scorePop.show { opacity:1; transform:translate(-50%, -22px); }
        
        #gameMsg {
            position:absolute; left:0; right:0; bottom:12px;
            text-align:center; font-size:12px; font-weight:700;
            color:rgba(255,255,255,0.92); pointer-events:none; z-index:20;
            text-shadow:0 2px 10px rgba(0,0,0,0.85);
        }
        
        /* Start */
        #startOverlay {
            position:fixed; inset:0; z-index:100;
            background:rgba(15,15,26,0.88);
            backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
            display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto;
        }
        #startCard {
            background:linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
            border:1px solid rgba(255,255,255,0.22);
            border-radius:26px; padding:24px 20px; width:100%; max-width:360px; text-align:center;
            box-shadow:0 22px 64px rgba(0,0,0,0.7);
        }
        #startCard h1 {
            margin:0 0 6px; font-size:34px; font-weight:900;
            background:linear-gradient(135deg, #fff 30%, #ffd166);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        #startCard h2 { margin:0 0 20px; font-size:12px; font-weight:700; color:rgba(255,255,255,0.75); letter-spacing:0.22em; text-transform:uppercase; }
        
        .field { margin-bottom:14px; text-align:left; }
        .field label { display:block; font-size:11px; font-weight:800; color:rgba(255,255,255,0.9); letter-spacing:0.18em; text-transform:uppercase; margin-bottom:8px; }
        .swatches { display:flex; gap:8px; flex-wrap:wrap; }
        .sw {
            width:44px; height:44px; border-radius:13px;
            border:2px solid rgba(255,255,255,0.2);
            cursor:pointer; overflow:hidden;
            transition:transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .sw.sel { border-color:#fff; transform:scale(1.12); box-shadow:0 0 22px rgba(255,255,255,0.35); }
        .sw canvas { width:100%; height:100%; display:block; border-radius:11px; }
        
        .inp {
            width:100%; padding:11px 14px; border-radius:14px;
            background:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.25);
            color:#fff; font-size:15px; font-weight:700; outline:none;
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
        }
        .inp::placeholder { color:rgba(255,255,255,0.35); font-weight:600; }
        
        .btn {
            display:inline-flex; align-items:center; justify-content:center;
            width:100%; padding:14px 0; border-radius:15px;
            border:none; font-size:15px; font-weight:900; letter-spacing:0.08em;
            color:#fff; margin-bottom:10px; cursor:pointer;
        }
        .btn.pri { background:linear-gradient(135deg,#e94560,#ff6b81); box-shadow:0 10px 30px rgba(233,69,96,0.5); }
        .btn.ghost { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.22); box-shadow:none; }
        
        /* Rules */
        #rulesModal {
            position:fixed; inset:0; z-index:200;
            background:rgba(15,15,26,0.82);
            backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
            display:none; align-items:center; justify-content:center; padding:22px;
        }
        #rulesModal.open { display:flex; }
        #rulesCard {
            background:linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
            border:1px solid rgba(255,255,255,0.2);
            border-radius:22px; padding:22px 20px; width:100%; max-width:360px;
            box-shadow:0 20px 52px rgba(0,0,0,0.7);
        }
        #rulesCard h3 { margin:0 0 12px; font-size:19px; font-weight:900; background:linear-gradient(135deg,#fff,#ffd166); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        #rulesCard ul { margin:0; padding-left:18px; color:rgba(255,255,255,0.88); font-size:13px; line-height:1.7; }
        #rulesCard li { margin-bottom:5px; }
        .closeBtn { margin-top:14px; width:100%; padding:12px 0; border-radius:13px; border:1px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.1); color:#fff; font-size:13px; font-weight:800; cursor:pointer; }
        
        /* Leaderboard */
        #lbModal {
            position:fixed; inset:0; z-index:300;
            background:rgba(15,15,26,0.88);
            backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
            display:none; align-items:center; justify-content:center; padding:22px;
        }
        #lbModal.open { display:flex; }
        #lbCard {
            background:linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
            border:1px solid rgba(255,255,255,0.2);
            border-radius:22px; padding:22px 20px; width:100%; max-width:360px;
            box-shadow:0 20px 52px rgba(0,0,0,0.7);
        }
        #lbCard h3 { margin:0 0 12px; font-size:19px; font-weight:900; }
        #lbList { list-style:none; margin:0; padding:0; max-height:55vh; overflow-y:auto; }
        #lbList li { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:13px; }
        #lbList .rk { width:26px; font-weight:900; color:#ffd166; }
        #lbList .nm { flex:1; color:rgba(255,255,255,0.9); font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        #lbList .sc { color:#fff; font-weight:900; }
        #lbEmpty { text-align:center; color:rgba(255,255,255,0.5); font-size:13px; padding:18px 0; }
    </style>
    <script src="matter.min.js"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="header">
            <div class="hcard">
                <div class="hlabel">得分</div>
                <div class="hvalue" id="score">0</div>
            </div>
            <div class="hcard">
                <div class="hdot" id="nextDot"></div>
            </div>
            <div class="hcard">
                <div class="hlabel">最高分</div>
                <div class="hvalue" id="best">0</div>
            </div>
            <div class="hcard" id="lbOpen" style="cursor:pointer; flex:0.55;">
                <div class="hlabel">排行榜</div>
                <div style="font-size:18px;">🏆</div>
            </div>
        </div>

        <div id="canvasArea">
            <div id="canvasWrap">
                <canvas id="gameCanvas" width="400" height="600"></canvas>
                <div id="touchLayer"></div>
                <div id="comboBadge">
                    <div class="cb-title" id="cbTitle">COMBO</div>
                    <div class="cb-main" id="cbMain">x2</div>
                    <div class="cb-sub" id="cbSub">不錯！</div>
                </div>
                <div id="scorePop">+0</div>
                <div id="gameMsg">點擊畫布投放史萊姆</div>
            </div>
        </div>

        <div id="bottomBar">
            <div class="pill" id="rulesPill">
                <div class="plabel">遊戲規則</div>
            </div>
            <div class="pill" id="restart" style="cursor:pointer">
                <div class="plabel">重新開始</div>
            </div>
        </div>
    </div>

    <div id="startOverlay">
        <div id="startCard">
            <h1>Slime Pop</h1>
            <h2>史萊姆進化大爆發</h2>
            <div class="field">
                <label>玩家名稱</label>
                <input type="text" id="playerName" class="inp" placeholder="輸入名字" maxlength="10" value="">
            </div>
            <div class="field">
                <label>波波圖案</label>
                <div class="swatches" id="swBar"></div>
            </div>
            <button class="btn pri" id="startBtn">Game Start</button>
            <button class="btn ghost" id="rulesBtn">遊戲規則</button>
        </div>
    </div>

    <div id="rulesModal">
        <div id="rulesCard">
            <h3>遊戲規則</h3>
            <ul>
                <li>點擊畫布投放史萊姆。</li>
                <li>相同等級碰撞會進化成更高等級。</li>
                <li>1.8 秒內連續合併可累積 Combo，倍率最高 x8。</li>
                <li>5 Combo 觸發 BOMB，炸掉範圍內小史萊姆。</li>
                <li>堆到紅線以上會 Game Over。</li>
                <li>投放在 1.8 秒內唔會觸發 Game Over。</li>
            </ul>
            <button class="closeBtn" id="closeRules">關閉</button>
        </div>
    </div>

    <div id="lbModal">
        <div id="lbCard">
            <h3>🏆 排行榜</h3>
            <div id="lbWrap">
                <ul id="lbList"></ul>
                <div id="lbEmpty">暫時冇記錄，玩一場先！</div>
            </div>
            <button class="closeBtn" id="closeLb">關閉</button>
        </div>
    </div>

    <script>
        window.onerror = function(m){ document.getElementById('gameMsg').innerText='錯誤：'+m; console.error(m); return true; };
        try {
            (function(){
                var M = window.Matter;
                var Engine=M.Engine, Render=M.Render, Runner=M.Runner, Bodies=M.Bodies, Composite=M.Composite, Events=M.Events, Body=M.Body;

                var canvas = document.getElementById('gameCanvas');
                var touch = document.getElementById('touchLayer');
                var msgEl = document.getElementById('gameMsg');
                var scoreEl = document.getElementById('score');
                var bestEl = document.getElementById('best');
                var nextDot = document.getElementById('nextDot');
                var comboBadge = document.getElementById('comboBadge');
                var cbTitle = document.getElementById('cbTitle');
                var cbMain = document.getElementById('cbMain');
                var cbSub = document.getElementById('cbSub');
                var scorePop = document.getElementById('scorePop');

                var engine = Engine.create(); var world = engine.world; engine.gravity.y=1.2;
                var render = Render.create({ canvas:canvas, engine:engine, options:{ width:400, height:600, wireframes:false, background:'transparent', pixelRatio:Math.min(window.devicePixelRatio||1,2) } });
                Render.run(render); var runner = Runner.create(); Runner.run(runner, engine);

                var wall={ isStatic:true, render:{ fillStyle:'#0f3460' } };
                Composite.add(world, [ Bodies.rectangle(200,610,420,24,wall), Bodies.rectangle(-10,300,24,600,wall), Bodies.rectangle(410,300,24,600,wall) ]);
                var danger = Bodies.rectangle(200,72,400,4,{ isStatic:true, isSensor:true, render:{ visible:true, fillStyle:'#e94560' } });
                Composite.add(world, danger);

                var score=0, best=parseInt(localStorage.getItem('slimeBest')||'0',10); bestEl.innerText=best;

                var types = [
                    {id:'cyan',   r:14, c:'#00f5d4', s:2},
                    {id:'blue',   r:22, c:'#00bbf9', s:4},
                    {id:'pink',   r:30, c:'#f15bb5', s:8},
                    {id:'yellow', r:38, c:'#fee440', s:16},
                    {id:'purple', r:46, c:'#9b5de5', s:32},
                    {id:'red',    r:54, c:'#ff006e', s:64}
                ];
                var skins={};

                (function buildSkins(){
                    var bar=document.getElementById('swBar');
                    types.forEach(function(t){
                        var cv=document.createElement('canvas'); cv.width=cv.height=64;
                        var ctx=cv.getContext('2d');
                        var grd=ctx.createRadialGradient(32,28,6,32,32,30);
                        grd.addColorStop(0,'rgba(255,255,255,0.95)');
                        grd.addColorStop(0.35,t.c);
                        grd.addColorStop(0.85,t.c);
                        grd.addColorStop(1,'rgba(0,0,0,0.25)');
                        ctx.fillStyle=grd;
                        ctx.beginPath(); ctx.arc(32,32,30,0,Math.PI*2); ctx.fill();
                        var sw=document.createElement('div'); sw.className='sw';
                        sw.appendChild(cv);
                        sw.onclick=function(){ document.querySelectorAll('.sw').forEach(function(x){x.classList.remove('sel');}); sw.classList.add('sel'); skins[t.id]=cv.toDataURL(); };
                        skins[t.id]=cv.toDataURL();
                        bar.appendChild(sw);
                    });
                })();

                var gameOver=false, nextLv=0, lockDrop=false;
                var combo=0, lastMerge=0, cm=1, comboT=null;

                function pickNext(){
                    var lv=Math.floor(Math.random()*3);
                    var t=types[lv];
                    nextDot.style.backgroundColor=t.c; nextDot.style.color=t.c;
                    return lv;
                }

                function flash(text,color){
                    scorePop.innerText=text; scorePop.style.color=color||'#ffd166';
                    scorePop.classList.add('show'); clearTimeout(scorePop._t);
                    scorePop._t=setTimeout(function(){ scorePop.classList.remove('show'); },900);
                }

                function showCombo(type,main,sub,isBomb){
                    comboBadge.classList.remove('bomb'); if(isBomb) comboBadge.classList.add('bomb');
                    cbTitle.innerText=type; cbMain.innerText=main; cbSub.innerText=sub||'';
                    comboBadge.classList.add('show'); clearTimeout(comboT);
                    comboT=setTimeout(function(){ comboBadge.classList.remove('show'); },1200);
                }

                function dropAt(x){
                    if(gameOver||lockDrop) return;
                    lockDrop=true; setTimeout(function(){ lockDrop=false; },220);
                    var t=types[nextLv];
                    Composite.add(world, Bodies.circle(x,40,t.r,{
                        restitution:0.25, friction:0.08, density:0.0018,
                        label:'slime_'+nextLv,
                        plugin:{ createdAt:Date.now() },
                        render:{ fillStyle:t.c, strokeStyle:'rgba(0,0,0,0.25)', lineWidth:1 }
                    }));
                    nextLv=pickNext(); msgEl.innerText='下一個：'+nextLv;
                }

                function resetGame(){
                    var all=Composite.allBodies(world);
                    for(var i=0;i<all.length;i++) if(!all[i].isStatic) Composite.remove(world,all[i]);
                    score=0; scoreEl.innerText='0'; combo=0; cm=1; gameOver=false; nextLv=pickNext();
                    comboBadge.classList.remove('show'); msgEl.innerText='點擊畫布投放史萊姆';
                }

                function getX(e){
                    var r=canvas.getBoundingClientRect();
                    var cx=(e.touches&&e.touches[0])?e.touches[0].clientX:(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0].clientX:e.clientX;
                    var x=((cx-r.left)/r.width)*400;
                    return Math.max(36,Math.min(364,x));
                }

                touch.addEventListener('touchstart',function(e){ e.preventDefault(); if(e.touches.length===1) dropAt(getX(e)); },{ passive:false });
                touch.addEventListener('touchend',function(){});
                touch.addEventListener('mousedown',function(e){ e.preventDefault(); dropAt(getX(e)); });

                function bombNear(x,y){
                    var blast=130,out=[],all=Composite.allBodies(world);
                    for(var i=0;i<all.length;i++){ var b=all[i]; if(b.isStatic) continue; var dx=b.position.x-x,dy=b.position.y-y,d=Math.sqrt(dx*dx+dy*dy); if(d<blast&&b.circleRadius&&b.circleRadius<=22) out.push(b); }
                    for(var j=0;j<out.length;j++) Composite.remove(world,out[j]);
                    return out.length;
                }

                var subs=['不錯！','厲害！','太強！','超精彩！','無敵！'];

                Events.on(engine,'collisionStart',function(ev){
                    var pairs=ev.pairs,merged={};
                    for(var i=0;i<pairs.length;i++){
                        var p=pairs[i], a=p.bodyA.label, b=p.bodyB.label;
                        if(!a||!b) continue;
                        if(a.indexOf('slime_')!==0||b.indexOf('slime_')!==0) continue;
                        if(merged[p.bodyA.id]||merged[p.bodyB.id]) continue;
                        if(a!==b) continue;

                        var now=Date.now();
                        if(now-lastMerge<1800) combo++; else combo=1;
                        lastMerge=now;

                        var lv=parseInt(a.split('_')[1],10);
                        if(combo>=5){
                            var cx=(p.bodyA.position.x+p.bodyB.position.x)/2;
                            var cy=(p.bodyA.position.y+p.bodyB.position.y)/2;
                            var n=bombNear(cx,cy);
                            showCombo('BOMB','x'+n,'激烈！',true);
                            flash('+'+(100+n*20),'#ff6b81'); score+=100+n*20; combo=0; cm=1; continue;
                        }
                        cm=Math.min(8,1+combo*0.5);
                        if(lv>=types.length-1) continue;
                        showCombo('COMBO x'+combo,'x'+cm.toFixed(1), subs[Math.min(combo-1,subs.length-1)], false);

                        var nx=types[lv+1], px=(p.bodyA.position.x+p.bodyB.position.x)/2, py=(p.bodyA.position.y+p.bodyB.position.y)/2;
                        Composite.remove(world,[p.bodyA,p.bodyB]);
                        merged[p.bodyA.id]=true; merged[p.bodyB.id]=true;
                        var baby=Bodies.circle(px,py,nx.r,{ restitution:0.3, friction:0.08, density:0.0018, label:'slime_'+(lv+1), plugin:{createdAt:Date.now()}, render:{ fillStyle:nx.c, strokeStyle:'rgba(0,0,0,0.25)', lineWidth:1 } });
                        Composite.add(world,baby);
                        var g=Math.round(nx.s*cm); score+=g; scoreEl.innerText=score; flash('+'+g,'#ffd166');
                    }
                });

                Events.on(engine,'afterUpdate',function(){
                    if(gameOver) return;
                    var topY=9999,all=Composite.allBodies(world);
                    for(var i=0;i<all.length;i++){ var b=all[i]; if(b.isStatic) continue; var t=b.position.y-(b.circleRadius||10); if(t<topY) topY=t; }
                    var ratio=Math.max(0,Math.min(1,(topY-72)/528));
                    var r=Math.round(233+22*ratio),g=Math.round(69+51*ratio),bl=Math.round(96+106*ratio);
                    danger.render.fillStyle='rgb('+r+','+g+','+bl+')';
                    for(var j=0;j<all.length;j++){ var bb=all[j]; if(bb.isStatic) continue; var age=Date.now()-((bb.plugin&&bb.plugin.createdAt)?bb.plugin.createdAt:0); if(bb.position.y<60&&Math.abs(bb.velocity.y)<0.8&&age>1800){ gameOver=true; msgEl.innerText='遊戲結束！最終得分：'+score; if(score>best){ best=score; bestEl.innerText=best; localStorage.setItem('slimeBest',String(best)); saveLb(); } break; } }
                });

                function lbKey(){ return 'slimeLb'; }
                function readLb(){ try{return JSON.parse(localStorage.getItem(lbKey())||'[]');}catch(e){return [];} }
                function writeLb(a){ localStorage.setItem(lbKey(),JSON.stringify(a)); }
                function saveLb(){
                    var name=(document.getElementById('playerName').value||'??').trim();
                    if(!name) return;
                    var lb=readLb(), idx=-1;
                    for(var i=0;i<lb.length;i++) if(lb[i].name===name){ idx=i; break; }
                    if(idx>=0){ if(score>lb[idx].score) lb[idx].score=score; } else { lb.push({name:name,score:score}); }
                    lb.sort(function(a,b){return b.score-a.score;}); if(lb.length>20) lb=lb.slice(0,20); writeLb(lb);
                }
                function renderLb(){
                    var lb=readLb(), ul=document.getElementById('lbList'), emp=document.getElementById('lbEmpty'); ul.innerHTML='';
                    if(!lb.length){ emp.style.display='block'; return; } emp.style.display='none';
                    lb.forEach(function(en,i){
                        var li=document.createElement('li');
                        li.innerHTML='<div class="rk">#'+(i+1)+'</div><div class="nm">'+en.name+'</div><div class="sc">'+en.score+'</div>';
                        ul.appendChild(li);
                    });
                }

                document.getElementById('startBtn').addEventListener('click',function(){
                    var n=(document.getElementById('playerName').value||'').trim();
                    if(!n){ document.getElementById('playerName').style.borderColor='#e94560'; return; }
                    document.getElementById('playerName').style.borderColor='rgba(255,255,255,0.25)';
                    localStorage.setItem('slimePlayer',n);
                    document.getElementById('startOverlay').style.display='none'; nextLv=pickNext();
                });
                document.getElementById('rulesBtn').addEventListener('click',function(){ document.getElementById('rulesModal').classList.add('open'); });
                document.getElementById('closeRules').addEventListener('click',function(){ document.getElementById('rulesModal').classList.remove('open'); });
                document.getElementById('restart').addEventListener('click',resetGame);
                document.getElementById('lbOpen').addEventListener('click',function(){ renderLb(); document.getElementById('lbModal').classList.add('open'); });
                document.getElementById('closeLb').addEventListener('click',function(){ document.getElementById('lbModal').classList.remove('open'); });

                nextLv=pickNext();
                if(window.StatusBar&&typeof window.StatusBar.hide==='function') setTimeout(function(){ try{window.StatusBar.hide();}catch(e){} }, 100);
            })();
        } catch(e){ document.getElementById('gameMsg').innerText='啟動失敗：'+e.message; console.error(e); }
    </script>
</body>
</html>
