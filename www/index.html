<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SlimePop">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="x-apple-disable-message-bar" content="true">
    <title>史萊姆進化大爆發 Slime Merge Pop!</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
            touch-action: none;
            -webkit-overflow-scrolling: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: calc(16px + var(--safe-top));
            padding-bottom: var(--safe-bottom);
            padding-left: var(--safe-left);
            padding-right: var(--safe-right));
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            gap: 10px;
        }

        .header-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 10px 12px;
            text-align: center;
            min-width: 0;
        }

        .header-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2px;
        }

        .header-value {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
            white-space: nowrap;
        }

        #gameCanvas {
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 400 / 600;
            max-height: 68vh;
        }

        #nextInfo {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .next-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .next-slime {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slime-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            box-shadow: 0 0 14px currentColor;
        }

        #msg {
            width: 100%;
            max-width: 400px;
            text-align: center;
            font-size: 13px;
            line-height: 1.3;
            color: rgba(255, 255, 255, 0.8);
            padding: 0 4px;
        }

        #rules {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }

        #rules summary {
            cursor: pointer;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            user-select: none;
        }

        #rules ul {
            margin: 8px 0 0 0;
            padding-left: 18px;
        }

        #rules li {
            margin-bottom: 4px;
        }
    </style>
    <script src="matter.min.js"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="header">
            <div class="header-card">
                <div class="header-label">得分</div>
                <div class="header-value" id="score">0</div>
            </div>
            <div class="header-card">
                <div class="header-label">下一隻</div>
                <div class="next-slime">
                    <div class="slime-dot" id="nextDot"></div>
                </div>
            </div>
            <div class="header-card">
                <div class="header-label">最高分</div>
                <div class="header-value" id="best">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="nextInfo">
            <div class="next-label">遊戲規則</div>
            <div class="next-slime">
                <div class="slime-dot" id="ruleDot"></div>
            </div>
        </div>

        <div id="msg">點擊或拖曳畫面釋放史萊姆，相同顏色+等級會進化！</div>

        <details id="rules">
            <summary>遊戲規則</summary>
            <ul>
                <li>點擊畫面投放史萊姆，相同等級與顏色碰撞會進化。</li>
                <li>每次進化都可賺取積分，等級愈高分數愈高。</li>
                <li>尽量避免堆到頂部红线，超过即game over。</li>
                <li>盡量合成高等级史莱姆，挑戰最高分！</li>
            </ul>
        </details>
    </div>

    <script>
        try {
            const { Engine, Render, Runner, Bodies, Composite, Body, Events, Mouse, MouseConstraint } = Matter;

            const engine = Engine.create();
            const world = engine.world;
            engine.gravity.y = 1.2;

            const canvas = document.getElementById('gameCanvas');
            const scoreEl = document.getElementById('score');
            const bestEl = document.getElementById('best');
            const nextDot = document.getElementById('nextDot');
            const ruleDot = document.getElementById('ruleDot');
            const msgEl = document.getElementById('msg');

            let score = 0;
            let best = parseInt(localStorage.getItem('slimeBest') || '0', 10);
            bestEl.innerText = best;

            const slimeTypes = [
                { radius: 14, color: '#00f5d4', score: 2 },
                { radius: 22, color: '#00bbf9', score: 4 },
                { radius: 30, color: '#f15bb5', score: 8 },
                { radius: 38, color: '#fee440', score: 16 },
                { radius: 46, color: '#9b5de5', score: 32 },
                { radius: 54, color: '#ff006e', score: 64 }
            ];

            const render = Render.create({
                canvas,
                engine,
                options: {
                    width: 400,
                    height: 600,
                    wireframes: false,
                    background: 'transparent',
                    pixelRatio: Math.min(window.devicePixelRatio || 1, 2)
                }
            });

            Render.run(render);
            const runner = Runner.create();
            Runner.run(runner, engine);

            const wallOptions = { isStatic: true, render: { fillStyle: '#0f3460' } };
            const ground = Bodies.rectangle(200, 610, 420, 24, wallOptions);
            const leftWall = Bodies.rectangle(-10, 300, 24, 600, wallOptions);
            const rightWall = Bodies.rectangle(410, 300, 24, 600, wallOptions);
            Composite.add(world, [ground, leftWall, rightWall]);

            const dangerZone = Bodies.rectangle(200, 80, 400, 6, {
                isStatic: true,
                isSensor: true,
                render: { visible: false }
            });
            Composite.add(world, dangerZone);

            let gameOver = false;

            function getEventX(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
                const x = ((clientX - rect.left) / rect.width) * 400;
                return Math.max(36, Math.min(364, x));
            }

            function pickNext() {
                const lv = Math.floor(Math.random() * 3);
                const t = slimeTypes[lv];
                nextDot.style.backgroundColor = t.color;
                nextDot.style.color = t.color;
                ruleDot.style.backgroundColor = t.color;
                ruleDot.style.color = t.color;
                return lv;
            }

            let nextLv = pickNext();

            function dropSlime(x) {
                if (gameOver) return;
                const type = slimeTypes[nextLv];
                const slime = Bodies.circle(x, 40, type.radius, {
                    restitution: 0.25,
                    friction: 0.08,
                    density: 0.0018,
                    label: 'slime_' + nextLv,
                    render: {
                        fillStyle: type.color,
                        strokeStyle: 'rgba(0,0,0,0.25)',
                        lineWidth: 1
                    }
                });
                Composite.add(world, slime);
                nextLv = pickNext();
            }

            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                dropSlime(getEventX(e));
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                dropSlime(getEventX(e));
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });

            Events.on(engine, 'collisionStart', function(event) {
                const pairs = event.pairs;
                const merged = new Set();

                pairs.forEach(pair => {
                    const labelA = pair.bodyA.label;
                    const labelB = pair.bodyB.label;

                    if (!labelA || !labelB) return;
                    if (!labelA.startsWith('slime_') || !labelB.startsWith('slime_')) return;
                    if (merged.has(pair.bodyA.id) || merged.has(pair.bodyB.id)) return;
                    if (labelA !== labelB) return;

                    const currentLv = parseInt(labelA.split('_')[1], 10);
                    if (currentLv >= slimeTypes.length - 1) return;

                    const nextType = slimeTypes[currentLv + 1];
                    const posX = (pair.bodyA.position.x + pair.bodyB.position.x) / 2;
                    const posY = (pair.bodyA.position.y + pair.bodyB.position.y) / 2;

                    Composite.remove(world, [pair.bodyA, pair.bodyB]);
                    merged.add(pair.bodyA.id);
                    merged.add(pair.bodyB.id);

                    const newSlime = Bodies.circle(posX, posY, nextType.radius, {
                        restitution: 0.3,
                        friction: 0.08,
                        density: 0.0018,
                        label: 'slime_' + (currentLv + 1),
                        render: {
                            fillStyle: nextType.color,
                            strokeStyle: 'rgba(0,0,0,0.25)',
                            lineWidth: 1
                        }
                    });
                    Composite.add(world, newSlime);

                    score += nextType.score;
                    scoreEl.innerText = score;
                });
            });

            Events.on(engine, 'afterUpdate', function() {
                if (gameOver) return;
                const allBodies = Composite.allBodies(world);
                for (const body of allBodies) {
                    if (body.isStatic) continue;
                    if (body.position.y < 60 && Math.abs(body.velocity.y) < 0.5) {
                        gameOver = true;
                        msgEl.innerText = '遊戲結束！最終得分：' + score;
                        if (score > best) {
                            best = score;
                            bestEl.innerText = best;
                            localStorage.setItem('slimeBest', String(best));
                        }
                        break;
                    }
                }
            });

            if (window.StatusBar && typeof window.StatusBar.hide === 'function') {
                setTimeout(() => {
                    try { window.StatusBar.hide(); } catch (e) { /* ignore */ }
                }, 100);
            }
        } catch (e) {
            document.getElementById('msg').innerText = '遊戲啟動失敗：' + e.message;
        }
    </script>
</body>
</html>
