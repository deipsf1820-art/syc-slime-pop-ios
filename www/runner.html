<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a2e">
<title>Slime Runner</title>
<style>
*{-webkit-tap-highlight-color:transparent;user-select:none;box-sizing:border-box}
html,body{margin:0;padding:0;background:#0a0a2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;overflow:hidden;height:100%;width:100%;position:fixed;inset:0}
#app{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:stretch;margin:0 auto;max-width:500px;background:linear-gradient(180deg,#1a1a5c 0%,#0a0a2e 60%,#05051a 100%)}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 16px;z-index:10;pointer-events:none}
.hcard{background:linear-gradient(180deg,rgba(255,255,255,0.14),rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.16);border-radius:14px;padding:8px 14px;text-align:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hlabel{font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.7);font-weight:800;text-transform:uppercase}
.hvalue{font-size:22px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
#wrap{flex:1;position:relative;overflow:hidden;touch-action:none}
canvas{display:block;width:100%;height:100%}
#overlay{position:fixed;inset:0;z-index:100;background:rgba(10,10,46,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .4s ease-out}
.card{background:linear-gradient(180deg,rgba(255,255,255,0.16),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.22);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.8);animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
.card h1{margin:0 0 6px;font-size:34px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 8px 20px rgba(255,209,102,0.35))}
.card h2{margin:0 0 20px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:0.2em;text-transform:uppercase}
.inp{width:100%;padding:13px 14px;border-radius:14px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:16px;font-weight:700;margin-bottom:14px;outline:none;transition:border-color .2s,transform .1s}
.inp::placeholder{color:rgba(255,255,255,0.35);font-weight:600}
.inp:focus{border-color:#ffd166;transform:scale(1.02)}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:14px 0;border-radius:14px;border:none;font-size:15px;font-weight:900;letter-spacing:0.1em;color:#fff;margin-bottom:10px;cursor:pointer;background:linear-gradient(135deg,#e94560,#ff6b81);box-shadow:0 14px 32px rgba(233,69,96,0.5);transition:transform .1s,box-shadow .2s}
.btn:active{transform:scale(0.97);box-shadow:0 8px 18px rgba(233,69,96,0.35)}
.btn.g{background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.05));border:1px solid rgba(255,255,255,0.22);box-shadow:none}
.tip{margin-top:10px;font-size:11px;color:rgba(255,255,255,0.6);line-height:1.6}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="hud" class="hidden">
    <div class="hcard"><div class="hlabel">得分</div><div class="hvalue" id="score">0</div></div>
    <div class="hcard"><div class="hlabel">最高</div><div class="hvalue" id="best">0</div></div>
  </div>
  <div id="wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<div id="overlay">
  <div class="card">
    <h1>Slime Runner</h1>
    <h2>無盡跑酷</h2>
    <input type="text" id="name" class="inp" placeholder="玩家名稱" maxlength="10" value="玩家">
    <button class="btn" id="go">開始奔跑</button>
    <button class="btn g" id="helpBtn">📖 操作說明</button>
    <p class="tip">點擊畫面或按空白鍵跳躍<br>避開障礙物，跑得越遠得分越高</p>
  </div>
</div>

<div id="overOv" class="hidden" style="position:fixed;inset:0;z-index:200;background:rgba(10,10,46,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;padding:20px">
  <div class="card">
    <h1>GAME OVER</h1>
    <p id="overText" style="margin:12px 0;color:rgba(255,255,255,0.88);font-size:14px;line-height:1.7"></p>
    <button class="btn" id="retry">再玩一次</button>
  </div>
</div>

<script>
"use strict";
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W=0, H=0;

// Game constants
const GROUND_Y_FRAC = 0.78;
const GRAVITY = 0.7;
const JUMP_VEL = -13.5;
const BASE_SPEED = 5;
const MAX_SPEED = 14;
const SPAWN_MIN = 55;
const SPAWN_MAX = 110;

// State
let hero=null, obstacles=[], particles=[], stars=[];
let score=0, best=0, speed=BASE_SPEED, running=false, over=false;
let spawnTimer=0, nextSpawn=80, tick=0;
let groundY=0;

try{best=parseInt(localStorage.getItem('slimeRunner_b')||'0',10)}catch(e){}

// ===== RESIZE =====
function resize(){
  const wrap=document.getElementById('wrap');
  const rect=wrap.getBoundingClientRect();
  W=Math.floor(rect.width);H=Math.floor(rect.height);
  if(W<100)W=320;if(H<100)H=300;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  groundY=Math.floor(H*GROUND_Y_FRAC);
}
window.addEventListener('resize',resize);

// ===== HERO =====
function createHero(){
  return {
    x: W*0.18,
    y: groundY,
    w: 36,
    h: 36,
    vy: 0,
    jumping: false,
    grounded: true,
    mouth: 0
  };
}

// ===== OBSTACLES =====
function spawnObstacle(){
  const types = [
    {w:22,h:44,type:'cactus'},
    {w:18,h:30,type:'cactus'},
    {w:28,h:50,type:'cactus'},
    {w:24,h:28,type:'rock'},
    {w:34,h:22,type:'bird'}
  ];
  const t = types[Math.floor(Math.random()*types.length)];
  obstacles.push({
    x: W+20,
    y: groundY - t.h,
    w: t.w,
    h: t.h,
    type: t.type,
    passed: false
  });
}

// ===== PARTICLES =====
function addParticle(x,y,color,count){
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6 - 2,
      life: 1,
      color,
      size: 2+Math.random()*3
    });
  }
}

// ===== STARS =====
function initStars(){
  stars=[];
  for(let i=0;i<60;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*groundY*0.7,
      size: Math.random()*1.5+0.5,
      twinkle: Math.random()*Math.PI*2
    });
  }
}

// ===== UPDATE =====
function update(){
  if(!running||over) return;
  tick++;
  
  // Increase speed gradually
  speed = Math.min(MAX_SPEED, BASE_SPEED + tick*0.003);
  
  // Hero physics
  hero.vy += GRAVITY;
  hero.y += hero.vy;
  
  // Ground collision
  if(hero.y >= groundY){
    hero.y = groundY;
    hero.vy = 0;
    hero.jumping = false;
    hero.grounded = true;
  } else {
    hero.grounded = false;
  }
  
  // Spawn obstacles
  spawnTimer++;
  if(spawnTimer >= nextSpawn){
    spawnObstacle();
    spawnTimer = 0;
    nextSpawn = SPAWN_MIN + Math.random()*(SPAWN_MAX - SPAWN_MIN);
    // Tighten spawn at higher speeds
    nextSpawn = Math.max(35, nextSpawn - speed*1.5);
  }
  
  // Update obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];
    o.x -= speed;
    
    // Score
    if(!o.passed && o.x + o.w < hero.x){
      o.passed = true;
      score += 10;
      document.getElementById('score').textContent = score;
    }
    
    // Remove off-screen
    if(o.x + o.w < -50){
      obstacles.splice(i,1);
      score += 5; // bonus for clearing
      document.getElementById('score').textContent = score;
    }
  }
  
  // Collision
  const hx=hero.x+hero.w/2, hy=hero.y-hero.h;
  const checkY = hero.y - hero.h*0.4;
  for(const o of obstacles){
    // AABB with forgiveness
    const ox1=o.x+4, oy1=o.y+4, ox2=o.x+o.w-4, oy2=o.y+o.h-4;
    const hx1=hero.x+6, hy1=checkY+6, hx2=hero.x+hero.w-6, hy2=hero.y-4;
    if(hx2>ox1 && hx1<ox2 && hy2>oy1 && hy1<oy2){
      gameOver();
      return;
    }
  }
  
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.2;
    p.life-=0.03;
    if(p.life<=0) particles.splice(i,1);
  }
  
  // Score for distance
  if(tick%10===0){
    score++;
    document.getElementById('score').textContent = score;
  }
}

function jump(){
  if(hero.grounded && running && !over){
    hero.vy = JUMP_VEL;
    hero.grounded = false;
    hero.jumping = true;
    addParticle(hero.x+hero.w/2, hero.y, '#ffd166', 8);
  }
}

function gameOver(){
  over=true;running=false;
  if(score>best){
    best=score;
    try{localStorage.setItem('slimeRunner_b',best)}catch(e){}
  }
  document.getElementById('best').textContent = best;
  document.getElementById('overText').textContent = `奔跑距離：${score} 公尺\n最佳紀錄：${best} 公尺`;
  document.getElementById('overOv').classList.remove('hidden');
  document.getElementById('overOv').style.display='flex';
  addParticle(hero.x+hero.w/2, hero.y-hero.h/2, '#ff6b81', 20);
}

function reset(){
  hero=createHero();
  obstacles=[];
  particles=[];
  score=0;
  speed=BASE_SPEED;
  spawnTimer=0;
  nextSpawn=80;
  tick=0;
  over=false;
  running=true;
  document.getElementById('score').textContent='0';
  document.getElementById('best').textContent=best;
  document.getElementById('overOv').classList.add('hidden');
  document.getElementById('overOv').style.display='none';
}

// ===== RENDER =====
function draw(){
  ctx.fillStyle='#0a0a2e';
  ctx.fillRect(0,0,W,H);
  
  // Stars
  for(const s of stars){
    s.twinkle += 0.03;
    const alpha = 0.4 + Math.abs(Math.sin(s.twinkle))*0.6;
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
  }
  
  // Mountains (parallax)
  const offset = (tick * speed * 0.3) % W;
  ctx.fillStyle='#12123a';
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  for(let x=0;x<=W;x+=40){
    const h = 40 + Math.sin((x+offset)*0.02)*30 + Math.sin((x+offset)*0.05)*15;
    ctx.lineTo(x, groundY-h);
  }
  ctx.lineTo(W,groundY);
  ctx.closePath();
  ctx.fill();
  
  // Ground
  ctx.fillStyle='#1a1a4a';
  ctx.fillRect(0, groundY, W, H-groundY);
  
  // Ground line
  ctx.strokeStyle='#2a2a6a';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(0,groundY);
  ctx.lineTo(W,groundY);
  ctx.stroke();
  
  // Ground details
  ctx.fillStyle='#222266';
  for(let x=(-offset*1.5)%40-40;x<W;x+=40){
    ctx.fillRect(x, groundY+8, 20, 2);
    ctx.fillRect(x+15, groundY+22, 15, 2);
  }
  
  // Obstacles
  for(const o of obstacles){
    ctx.save();
    ctx.translate(o.x+o.w/2, o.y+o.h);
    
    if(o.type==='cactus'){
      // Main stem
      ctx.fillStyle='#2d8a4e';
      ctx.fillRect(-o.w/2, -o.h, o.w, o.h);
      // Arms
      ctx.fillRect(-o.w/2-4, -o.h*0.6, o.w+8, 6);
      // Highlights
      ctx.fillStyle='#4aad62';
      ctx.fillRect(-o.w/2+3, -o.h+4, 3, o.h-8);
      // Spikes
      ctx.fillStyle='#1e6b38';
      for(let i=0;i<3;i++){
        const sy = -o.h*(0.3+i*0.25);
        ctx.beginPath();
        ctx.moveTo(-o.w/2, sy);
        ctx.lineTo(-o.w/2-5, sy-4);
        ctx.lineTo(-o.w/2+2, sy);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(o.w/2, sy);
        ctx.lineTo(o.w/2+5, sy-4);
        ctx.lineTo(o.w/2-2, sy);
        ctx.fill();
      }
    } else if(o.type==='rock'){
      ctx.fillStyle='#4a4a7a';
      ctx.beginPath();
      ctx.moveTo(-o.w/2, 0);
      ctx.lineTo(-o.w/2+4, -o.h);
      ctx.lineTo(o.w/2-4, -o.h);
      ctx.lineTo(o.w/2, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle='#5a5a8a';
      ctx.fillRect(-o.w/2+6, -o.h+4, o.w-16, 4);
    } else if(o.type==='bird'){
      // Wings flap
      const flap = Math.sin(tick*0.5)*0.4;
      ctx.fillStyle='#ff6b81';
      // Body
      ctx.beginPath();
      ctx.ellipse(0, -o.h/2, o.w/2, o.h/3, 0, 0, Math.PI*2);
      ctx.fill();
      // Wings
      ctx.fillStyle='#e94560';
      ctx.beginPath();
      ctx.moveTo(0, -o.h/2);
      ctx.lineTo(-o.w/2-4, -o.h/2-o.h*0.6-flap*10);
      ctx.lineTo(-2, -o.h/2);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, -o.h/2);
      ctx.lineTo(o.w/2+4, -o.h/2-o.h*0.6+flap*10);
      ctx.lineTo(2, -o.h/2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  
  // Particles
  for(const p of particles){
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Hero
  const hx=hero.x, hy=hero.y-hero.h;
  ctx.save();
  ctx.translate(hx+hero.w/2, hero.y);
  
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();
  const shadowScale=hero.grounded?1:0.7;
  ctx.ellipse(0,2,hero.w/2*shadowScale,4*shadowScale,0,0,Math.PI*2);
  ctx.fill();
  
  ctx.translate(-hero.w/2, -hero.h);
  
  // Glow
  const glow=ctx.createRadialGradient(hero.w/2,hero.h/2,hero.w*0.2,hero.w/2,hero.h/2,hero.w*1.2);
  glow.addColorStop(0,'rgba(255,209,102,0.25)');
  glow.addColorStop(1,'rgba(255,209,102,0)');
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(hero.w/2,hero.h/2,hero.w*1.2,0,Math.PI*2);ctx.fill();
  
  // Body
  ctx.fillStyle='#ffd166';
  ctx.beginPath();
  const mouthAngle = Math.abs(Math.sin(hero.mouth))*0.4;
  const bounce = hero.grounded ? Math.sin(tick*0.3)*2 : 0;
  ctx.arc(hero.w/2, hero.h/2+bounce, hero.w/2.2, mouthAngle, Math.PI*2-mouthAngle);
  ctx.lineTo(hero.w/2, hero.h/2);
  ctx.closePath();
  ctx.fill();
  
  // Eye
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.arc(hero.w/2+6, hero.h/2-4+bounce, 3, 0, Math.PI*2);
  ctx.fill();
  
  ctx.restore();
  
  // Speed lines
  if(speed > 7){
    ctx.strokeStyle='rgba(255,255,255,0.15)';
    ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      const sy = groundY - 20 - Math.random()*100;
      const sx = Math.random()*W;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx-speed*2, sy);
      ctx.stroke();
    }
  }
}

// ===== INPUT =====
function handleJump(e){
  if(e.target.tagName==='INPUT') return;
  e.preventDefault();
  if(!running && !over){
    document.getElementById('overlay').classList.add('hidden');
    startGame();
  } else if(running && !over){
    jump();
  } else if(over){
    reset();
  }
}

document.addEventListener('keydown', e=>{
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
    e.preventDefault();
    if(!running && !over){
      document.getElementById('overlay').classList.add('hidden');
      startGame();
    } else if(running && !over){
      jump();
    } else if(over){
      reset();
    }
  }
});

canvas.addEventListener('touchstart', handleJump, {passive:false});
canvas.addEventListener('mousedown', handleJump);

document.getElementById('go').addEventListener('click', ()=>{
  const n=document.getElementById('name').value.trim();
  if(!n){document.getElementById('name').style.borderColor='#e94560';return}
  document.getElementById('name').style.borderColor='rgba(255,255,255,0.25)';
  document.getElementById('overlay').classList.add('hidden');
  startGame();
});

document.getElementById('retry').addEventListener('click', reset);
document.getElementById('helpBtn').addEventListener('click', ()=>{
  alert('操作說明\n• 點擊畫面 / 空白鍵 / ↑ / W = 跳躍\n• 跑得越遠分數越高\n• 速度會漸漸加快\n• 避開仙人掌、岩石和飛鳥');
});

// ===== GAME FLOW =====
function startGame(){
  resize();
  hero=createHero();
  obstacles=[];
  particles=[];
  score=0;
  speed=BASE_SPEED;
  spawnTimer=0;
  nextSpawn=80;
  tick=0;
  over=false;
  running=true;
  initStars();
  document.getElementById('score').textContent='0';
  document.getElementById('best').textContent=best;
  document.getElementById('hud').classList.remove('hidden');
  loop();
}

// ===== LOOP =====
let lastTime=0;
function loop(ts){
  if(!lastTime) lastTime=ts;
  const dt=ts-lastTime;
  lastTime=ts;
  
  if(running&&!over){
    update();
  }
  
  draw();
  
  if(running||particles.length){
    requestAnimationFrame(loop);
  }
}

// Initial
resize();
draw();
</script>
</body>
</html>
