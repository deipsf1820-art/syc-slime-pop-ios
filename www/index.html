<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080a1f">
<title>史萊姆進化大爆發 Slime Merge Pop!</title>
<style>
*{-webkit-tap-highlight-color:transparent;user-select:none;box-sizing:border-box}
html,body{margin:0;padding:0;background:#080a1f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;overflow:hidden;height:100%;width:100%;position:fixed;inset:0}
#gameContainer{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;margin:0 auto;padding:7px 9px 11px;max-width:480px;background:radial-gradient(1200px 600px at 50% 0%,#12193a,#080a1f 70%)}
#header{width:100%;display:flex;gap:7px;flex-shrink:0}
.hcard{flex:1;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.05));border:1px solid rgba(255,255,255,0.18);border-radius:14px;padding:7px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.hlabel{font-size:9px;text-transform:uppercase;letter-spacing:0.16em;color:rgba(255,255,255,0.65);margin-bottom:2px;font-weight:800;line-height:1}
.hvalue{font-size:18px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:0 0 0 transparent;line-height:1.1}
.hdot{width:22px;height:22px;border-radius:50%;box-shadow:0 0 16px currentColor,inset 0 0 10px rgba(0,0,0,0.35);flex-shrink:0;border:1.5px solid rgba(255,255,255,0.25)}
#canvasWrap{position:relative;width:100%;flex:1;min-height:0;overflow:hidden;border-radius:16px;background:linear-gradient(180deg,#0f1832,#091130);box-shadow:0 18px 40px rgba(0,0,0,0.55),inset 0 0 0 1px rgba(255,255,255,0.08)}
#gameCanvas{display:block;width:100%;height:100%}
#bottomBar{width:100%;display:flex;justify-content:space-between;gap:8px;flex-shrink:0;margin-top:9px}
.pill{background:linear-gradient(180deg,rgba(255,255,255,0.14),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.18);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:7px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.plabel{font-size:11px;color:rgba(255,255,255,0.85);letter-spacing:0.14em;text-transform:uppercase;font-weight:800}

#startOverlay{position:fixed;inset:0;z-index:100;background:rgba(8,10,31,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px}
#startCard{background:linear-gradient(180deg,rgba(255,255,255,0.16),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.22);border-radius:24px;padding:24px 20px;width:100%;max-width:340px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
#startCard h1{margin:0 0 5px;font-size:32px;font-weight:900;background:linear-gradient(135deg,#fff 20%,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 8px 20px rgba(255,209,102,0.35))}
#startCard h2{margin:0 0 20px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:0.22em;text-transform:uppercase}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:10px;font-weight:800;color:rgba(255,255,255,0.9);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:7px}
.inp{width:100%;padding:11px 12px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.22);color:#fff;font-size:14px;font-weight:700;outline:none;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.inp::placeholder{color:rgba(255,255,255,0.35);font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:13px 0;border-radius:14px;border:none;font-size:14px;font-weight:900;letter-spacing:0.1em;color:#fff;margin-bottom:9px;cursor:pointer;background:linear-gradient(135deg,#e94560,#ff6b81);box-shadow:0 14px 32px rgba(233,69,96,0.45)}
.btn.ghost{background:linear-gradient(180deg,rgba(255,255,255,0.14),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.22);box-shadow:none}

#rulesModal{position:fixed;inset:0;z-index:200;background:rgba(8,10,31,0.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:18px}
#rulesModal.open{display:flex}
#rulesCard{background:linear-gradient(180deg,rgba(255,255,255,0.16),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.2);border-radius:22px;padding:22px 20px;width:100%;max-width:340px;box-shadow:0 22px 52px rgba(0,0,0,0.75)}
#rulesCard h3{margin:0 0 10px;font-size:18px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#rulesCard ul{margin:0;padding-left:18px;color:rgba(255,255,255,0.88);font-size:12px;line-height:1.75}
#rulesCard li{margin-bottom:5px}
.closeBtn{margin-top:12px;width:100%;padding:11px 0;border-radius:12px;border:1px solid rgba(255,255,255,0.22);background:linear-gradient(180deg,rgba(255,255,255,0.14),rgba(255,255,255,0.06));color:#fff;font-size:12px;font-weight:800;cursor:pointer}

#lbModal{position:fixed;inset:0;z-index:300;background:rgba(8,10,31,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:none;align-items:center;justify-content:center;padding:22px}
#lbModal.open{display:flex}
#lbCard{background:linear-gradient(180deg,rgba(255,255,255,0.16),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.2);border-radius:22px;padding:22px 20px;width:100%;max-width:340px;box-shadow:0 22px 52px rgba(0,0,0,0.75)}
#lbCard h3{margin:0 0 12px;font-size:18px;font-weight:900}
#lbList{list-style:none;margin:0;padding:0;max-height:55vh;overflow-y:auto}
#lbList li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:12px}
#lbList .rk{width:26px;font-weight:900;color:#ffd166;text-shadow:0 0 10px rgba(255,209,102,0.5)}
#lbList .nm{flex:1;color:rgba(255,255,255,0.9);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#lbList .sc{color:#fff;font-weight:900}
#lbEmpty{text-align:center;color:rgba(255,255,255,0.5);font-size:12px;padding:18px 0;display:none}
</style>
<script src="matter.min.js"></script>
</head>
<body>
<div id="gameContainer">
    <div id="header">
        <div class="hcard"><div class="hlabel">得分</div><div class="hvalue" id="score">0</div></div>
        <div class="hcard"><div class="hdot" id="nextDot"></div></div>
        <div class="hcard"><div class="hlabel">最高分</div><div class="hvalue" id="best">0</div></div>
        <div class="hcard" id="lbOpen" style="cursor:pointer;flex:0.55"><div class="hlabel">排行榜</div><div style="font-size:clamp(14px,4vh,18px)">🏆</div></div>
    </div>
    <div id="canvasWrap">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="bottomBar">
        <div class="pill" id="rulesPill" style="cursor:pointer"><div class="plabel">遊戲規則</div></div>
        <div class="pill" id="restart" style="cursor:pointer"><div class="plabel">重新開始</div></div>
    </div>
</div>

<div id="startOverlay">
    <div id="startCard">
        <h1>Slime Pop</h1><h2>史萊姆進化大爆發</h2>
        <div class="field"><label>玩家名稱</label><input type="text" id="playerName" class="inp" placeholder="輸入名字" maxlength="10" value=""></div>
        <button class="btn" id="startBtn">Game Start</button>
        <button class="btn ghost" id="rulesBtn">遊戲規則</button>
    </div>
</div>

<div id="rulesModal">
    <div id="rulesCard">
        <h3>遊戲規則</h3>
        <ul>
            <li>點擊畫布投放史萊姆。</li>
            <li>相同等級碰撞會進化成更高等級。</li>
            <li>連續合併可累積 Combo，倍率最高 x8。</li>
            <li>5 Combo 觸發 BOMB，炸掉範圍內小史萊姆。</li>
            <li>堆到紅線以上會 Game Over。</li>
            <li>投放在 1.8 秒內唔會觸發 Game Over。</li>
            <li>最高等級合併會爆開消失並給予大量獎勵分。</li>
        </ul>
        <button class="closeBtn" id="closeRules">關閉</button>
    </div>
</div>

<div id="lbModal">
    <div id="lbCard">
        <h3>🏆 排行榜</h3>
        <div id="lbWrap"><ul id="lbList"></ul><div id="lbEmpty">暫時冇記錄，玩一場先！</div></div>
        <button class="closeBtn" id="closeLb">關閉</button>
    </div>
</div>

<script>
window.onerror=function(m){document.getElementById('gameMsg')&&(document.getElementById('gameMsg').innerText='錯誤：'+m);console.error(m);return true};
(function(){
var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
if(!ctx){alert('錯誤：瀏覽器唔支持 2D 繪圖');return;}
var W=0,H=0;
function resize(){
    var wrap=document.getElementById('canvasWrap');
    W=wrap.clientWidth;H=wrap.clientHeight;
    if(!W||!H)return;
    var dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

var M=window.Matter,Engine=M.Engine,Render=M.Render,Runner=M.Runner,Bodies=M.Bodies,Composite=M.Composite,Events=M.Events,Body=M.Body;
var engine=Engine.create(),world=engine.world;engine.gravity.y=1.2;
Render.run(Render.create({canvas:canvas,engine:engine,options:{width:W||400,height:H||600,wireframes:false,background:'transparent',pixelRatio:Math.min(window.devicePixelRatio||1,2)}}));
Runner.run(Runner.create(),engine);

function makeWall(x,y,w,h){return Bodies.rectangle(x,y,w,h,{isStatic:true,render:{fillStyle:'#0b1230'}})}
Composite.add(world,[makeWall(W/2,H+12,W+40,24),makeWall(-12,H/2,24,H+40),makeWall(W+12,H/2,24,H+40)]);
var danger=Bodies.rectangle(W/2,Math.max(58,H*0.1),Math.max(W,400),4,{isStatic:true,isSensor:true,render:{visible:true,fillStyle:'#ff4070'}});
Composite.add(world,danger);

var score=0,best=parseInt(localStorage.getItem('slimeBest')||'0',10);
var types=[];
function hslToHex(h,s,l){var a=s*Math.min(l,1-l);var f=function(n){var k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1);};return '#'+[f(0),f(8),f(4)].map(function(x){return Math.round(x*255).toString(16).padStart(2,'0')}).join('');}
for(var lv=0;lv<99;lv++){var hue=210+lv*2.4; var sat=82+Math.sin(lv/99*Math.PI)*18; var light=58+Math.sin(lv/99*Math.PI*2)*9; types.push({id:''+lv,r:12+lv*0.85,c:hslToHex(hue,sat,light),s:lv*lv*2+20})}

var gameOver=false,nextLv=0,lockDrop=false,combo=0,lastMerge=0,cm=1,comboT=null,gameMsg=document.createElement('div');gameMsg.id='gameMsg';gameMsg.style.cssText='position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:12px;font-weight:800;color:rgba(255,255,255,0.92);pointer-events:none;z-index:20;text-shadow:0 2px 10px rgba(0,0,0,0.85)';document.getElementById('canvasWrap').appendChild(gameMsg);
function pickNext(){return Math.floor(Math.random()*Math.min(5,types.length))}
function refreshNextDot(){var dot=document.getElementById('nextDot');dot.style.backgroundColor=types[nextLv].c;dot.style.color=types[nextLv].c}
function showCombo(type,main,sub,isBomb){}

var fwParts=[];
function spawnFirework(x,y,color,count){var n=count||28;for(var i=0;i<n;i++){var a=(Math.PI*2/n)*i,speed=2.2+Math.random()*3.2;fwParts.push({x:x,y:y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,life:1,decay:0.025+Math.random()*0.025,color:color||'#ffd166',size:2.2+Math.random()*2.2})}}
function drawFireworks(){ctx.save();for(var i=fwParts.length-1;i>=0;i--){var p=fwParts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.decay;if(p.life<=0){fwParts.splice(i,1);continue;}ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill()}ctx.restore();}
function loop(){drawFireworks();requestAnimationFrame(loop)}
requestAnimationFrame(loop);

function dropAt(x){
    if(gameOver||lockDrop)return;lockDrop=true;setTimeout(function(){lockDrop=false},220);
    var t=types[nextLv];
    Composite.add(world,Bodies.circle(x,28,t.r,{restitution:0.25,friction:0.08,density:0.0018,label:'slime_'+nextLv,plugin:{createdAt:Date.now()},render:{fillStyle:t.c,strokeStyle:'rgba(0,0,0,0.25)',lineWidth:1}}));
    nextLv=pickNext();refreshNextDot();
}
function resetGame(){var all=Composite.allBodies(world);for(var i=0;i<all.length;i++)if(!all[i].isStatic)Composite.remove(world,all[i]);score=0;document.getElementById('score').innerText='0';combo=0;cm=1;gameOver=false;nextLv=pickNext();gameMsg.innerText='點擊畫布投放史萊姆';fwParts=[];}
function getX(e){var r=canvas.getBoundingClientRect();var cx=(e.touches&&e.touches[0])?e.touches[0].clientX:(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0].clientX:e.clientX;var x=((cx-r.left)/r.width)*W;return Math.max(20,Math.min(W-20,x))}
canvas.addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length===1)dropAt(getX(e))},{passive:false});
canvas.addEventListener('touchend',function(){});
canvas.addEventListener('mousedown',function(e){e.preventDefault();dropAt(getX(e))});

function bombNear(bx,by){var blast=130,out=[],all=Composite.allBodies(world);for(var i=0;i<all.length;i++){var b=all[i];if(b.isStatic)continue;var dx=b.position.x-bx,dy=b.position.y-by,d=Math.sqrt(dx*dx+dy*dy);if(d<blast&&b.circleRadius&&b.circleRadius<=22)out.push(b)}for(var j=0;j<out.length;j++){var bb=out[j];spawnFirework(bb.position.x,bb.position.y,types[bb.label.split('_')[1]].c);Composite.remove(world,bb)}return out.length}
var subs=['不錯！','厲害！','太強！','超精彩！','無敵！'];
Events.on(engine,'collisionStart',function(ev){var pairs=ev.pairs,merged={};for(var i=0;i<pairs.length;i++){var p=pairs[i],a=p.bodyA.label,b=p.bodyB.label;if(!a||!b)continue;if(a.indexOf('slime_')!==0||b.indexOf('slime_')!==0)continue;if(merged[p.bodyA.id]||merged[p.bodyB.id])continue;if(a!==b)continue;var now=Date.now();if(now-lastMerge<1800)combo++;else combo=1;lastMerge=now;var lv=parseInt(a.split('_')[1],10);if(combo>=5){var cx2=(p.bodyA.position.x+p.bodyB.position.x)/2,cy2=(p.bodyA.position.y+p.bodyB.position.y)/2;var n=bombNear(cx2,cy2);combo=0;cm=1;continue;}cm=Math.min(8,1+combo*0.5);if(lv>=types.length-1){var cx3=(p.bodyA.position.x+p.bodyB.position.x)/2,cy3=(p.bodyA.position.y+p.bodyB.position.y)/2;spawnFirework(cx3,cy3,'#ffd166',48);Composite.remove(world,[p.bodyA,p.bodyB]);merged[p.bodyA.id]=true;merged[p.bodyB.id]=true;var bonus=Math.round(types[lv].s*cm*3);score+=bonus;document.getElementById('score').innerText=score;continue;}showCombo('COMBO x'+combo,'x'+cm.toFixed(1),subs[Math.min(combo-1,subs.length-1)],false);var nx=types[lv+1],px=(p.bodyA.position.x+p.bodyB.position.x)/2,py=(p.bodyA.position.y+p.bodyB.position.y)/2;spawnFirework(px,py,nx.c);Composite.remove(world,[p.bodyA,p.bodyB]);merged[p.bodyA.id]=true;merged[p.bodyB.id]=true;var baby=Bodies.circle(px,py,nx.r,{restitution:0.3,friction:0.08,density:0.0018,label:'slime_'+(lv+1),plugin:{createdAt:Date.now()},render:{fillStyle:nx.c,strokeStyle:'rgba(0,0,0,0.25)',lineWidth:1}});Composite.add(world,baby);var g=Math.round(nx.s*cm);score+=g;document.getElementById('score').innerText=score;}});

Events.on(engine,'afterUpdate',function(){if(gameOver)return;var topY=9999,all=Composite.allBodies(world);for(var i=0;i<all.length;i++){var b=all[i];if(b.isStatic)continue;var t=b.position.y-(b.circleRadius||10);if(t<topY)topY=t}var ratio=Math.max(0,Math.min(1,(topY-(H*0.1))/Math.max(10,H-60)));var r=Math.round(233+22*ratio),gg=Math.round(69+51*ratio),bl=Math.round(96+106*ratio);danger.render.fillStyle='rgb('+r+','+gg+','+bl+')';for(var j=0;j<all.length;j++){var bb=all[j];if(bb.isStatic)continue;var age=Date.now()-((bb.plugin&&bb.plugin.createdAt)?bb.plugin.createdAt:0);if(bb.position.y<50&&Math.abs(bb.velocity.y)<0.8&&age>1800){gameOver=true;gameMsg.innerText='遊戲結束！最終得分：'+score;if(score>best){best=score;localStorage.setItem('slimeBest',String(best));saveLb()}break}}});

function lbKey(){return'slimeLb'}function readLb(){try{return JSON.parse(localStorage.getItem(lbKey())||'[]')}catch(e){return[]}}function writeLb(a){localStorage.setItem(lbKey(),JSON.stringify(a))}
function saveLb(){var name2=(document.getElementById('playerName').value||'??').trim();if(!name2)return;var lb=readLb(),idx=-1;for(var i=0;i<lb.length;i++)if(lb[i].name===name2){idx=i;break}if(idx>=0){if(score>lb[idx].score)lb[idx].score=score}else{lb.push({name:name2,score:score})}lb.sort(function(a,b){return b.score-a.score});if(lb.length>10)lb=lb.slice(0,10);writeLb(lb)}
function renderLb(){var lb=readLb(),ul=document.getElementById('lbList'),emp=document.getElementById('lbEmpty');ul.innerHTML='';if(!lb.length){emp.style.display='block';return}emp.style.display='none';lb.forEach(function(en,i){var li=document.createElement('li');li.innerHTML='<div class="rk">#'+(i+1)+'</div><div class="nm">'+en.name+'</div><div class="sc">'+en.score+'</div>';ul.appendChild(li)})}
document.getElementById('startBtn').addEventListener('click',function(){try{var n=(document.getElementById('playerName').value||'').trim();if(!n){document.getElementById('playerName').style.borderColor='#e94560';return}document.getElementById('playerName').style.borderColor='rgba(255,255,255,0.25)';var ov=document.getElementById('startOverlay');ov.style.display='none';ov.style.visibility='hidden';ov.style.pointerEvents='none';nextLv=pickNext();resetGame();console.log('START_OK')}catch(e){console.error('START_FAIL',e);gameMsg.innerText='啟動失敗：'+e.message}});
document.getElementById('rulesBtn').addEventListener('click',function(){document.getElementById('rulesModal').classList.add('open')});
document.getElementById('closeRules').addEventListener('click',function(){document.getElementById('rulesModal').classList.remove('open')});
document.getElementById('restart').addEventListener('click',resetGame);
document.getElementById('lbOpen').addEventListener('click',function(){renderLb();document.getElementById('lbModal').classList.add('open')});
document.getElementById('closeLb').addEventListener('click',function(){document.getElementById('lbModal').classList.remove('open')});
nextLv=pickNext();refreshNextDot();
})();
</script>
</body>
</html>
