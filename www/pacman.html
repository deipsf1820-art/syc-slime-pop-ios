<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Maze King 99</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a2e;font-family:-apple-system,sans-serif;color:#fff}
#app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto}
#header{display:flex;gap:6px;padding:6px 10px;flex-shrink:0}
.hcard{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:6px;text-align:center}
.hlabel{font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:0.1em;font-weight:700}
.hvalue{font-size:18px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#wrap{flex:1;position:relative;overflow:hidden;margin:0 8px;border-radius:12px;background:#0f0f3a}
canvas{display:block;width:100%;height:100%;touch-action:none}
#pauseBtn{position:absolute;top:8px;right:8px;width:36px;height:36px;border-radius:10px;background:rgba(233,69,96,0.9);border:none;color:#fff;font-size:16px;font-weight:900;z-index:5;display:flex;align-items:center;justify-content:center}
#bar{display:flex;gap:6px;padding:6px 8px 8px;flex-shrink:0}
.ctrl{flex:1;height:48px;border-radius:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.ctrl:active{transform:scale(0.92)}
#start,#pause,#over{position:fixed;inset:0;z-index:100;background:rgba(10,10,46,0.92);display:flex;align-items:center;justify-content:center;padding:20px}
.hidden{display:none!important}
.card{background:linear-gradient(180deg,rgba(255,255,255,0.16),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.22);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.8)}
.card h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.card h2{font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:0.2em;margin-bottom:20px;font-weight:800}
.inp{width:100%;padding:12px;border-radius:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:16px;font-weight:700;margin-bottom:12px;outline:none}
.btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#e94560,#ff6b81);color:#fff;font-size:14px;font-weight:900;letter-spacing:0.1em;margin-bottom:8px;cursor:pointer;box-shadow:0 12px 28px rgba(233,69,96,0.5)}
.btn:active{transform:scale(0.97)}
.btn.g{background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.05));border:1px solid rgba(255,255,255,0.2);box-shadow:none}
.card p{margin:12px 0;color:rgba(255,255,255,0.85);font-size:13px;line-height:1.7;text-align:left}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hcard"><div class="hlabel">得分</div><div class="hvalue" id="score">0</div></div>
    <div class="hcard"><div class="hlabel">關卡</div><div class="hvalue" id="level">1</div></div>
    <div class="hcard"><div class="hlabel">生命</div><div class="hvalue" id="lives">3</div></div>
  </div>
  <div id="wrap">
    <canvas id="c"></canvas>
    <button id="pauseBtn">⏸</button>
  </div>
  <div id="bar">
    <div style="flex:1;display:flex;gap:6px">
      <button class="ctrl" id="mL">◀</button>
      <button class="ctrl" id="mU">▲</button>
    </div>
    <div style="flex:1;display:flex;gap:6px">
      <button class="ctrl" id="mR">▶</button>
      <button class="ctrl" id="mD">▼</button>
    </div>
  </div>
</div>

<div id="start">
  <div class="card">
    <h1>Maze King 99</h1>
    <h2>迷宮王者</h2>
    <input type="text" id="name" class="inp" placeholder="玩家名稱" maxlength="10" value="玩家">
    <button class="btn" id="go">開始遊戲</button>
    <button class="btn g" id="helpBtn">操作說明</button>
  </div>
</div>

<div id="pause" class="hidden">
  <div class="card">
    <h1>PAUSED</h1>
    <button class="btn" id="resume">繼續</button>
    <button class="btn g" id="restart">重新開始</button>
  </div>
</div>

<div id="over" class="hidden">
  <div class="card">
    <h1>GAME OVER</h1>
    <p id="overText">關卡 1 · 得分 0</p>
    <button class="btn" id="retry">再玩一次</button>
  </div>
</div>

<script>
// ===== CANVAS SETUP =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, CELL = 24, OX = 0, OY = 0;

// ===== GAME CONSTANTS =====
const COLS = 19, ROWS = 21;
const WALL = 1, DOT = 2, POWER = 4, EMPTY = 0;

// ===== GAME STATE =====
let maze = [], dots = [];
let hero = {x:1, y:1, dir:{x:0,y:0}, next:{x:0,y:0}, mouth:0};
let ghosts = [];
let score = 0, lives = 3, level = 1, best = 0;
let running = false, paused = false, over = false;
let tick = 0;

try { best = parseInt(localStorage.getItem('mk99_best')||'0',10); } catch(e){}

// ===== MAZE GENERATION (Recursive Backtracker) =====
function generateMaze(){
  const m = [];
  for(let y=0;y<ROWS;y++){m[y]=[];for(let x=0;x<COLS;x++)m[y][x]=WALL}
  
  function carve(cx, cy){
    const dirs = [[0,-2],[2,0],[0,2],[-2,0]];
    // Fisher-Yates shuffle
    for(let i=dirs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dirs[i],dirs[j]]=[dirs[j],dirs[i]]}
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy;
      if(nx>0 && nx<COLS-1 && ny>0 && ny<ROWS-1 && m[ny][nx]===WALL){
        m[cy+dy/2][cx+dx/2] = DOT;
        m[ny][nx] = DOT;
        carve(nx, ny);
      }
    }
  }
  
  m[1][1] = DOT;
  carve(1, 1);
  
  // Ensure start path
  m[1][1] = DOT; m[1][2] = DOT; m[2][1] = DOT;
  
  // Ghost house center
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    if(Math.abs(dx)+Math.abs(dy)<=1) m[cy+dy][cx+dx] = DOT;
  }
  
  // Open some walls for easier gameplay
  const extras = Math.min(level * 2, 20);
  for(let i=0;i<extras;i++){
    const rx = 2 + Math.floor(Math.random()*(COLS-4));
    const ry = 2 + Math.floor(Math.random()*(ROWS-4));
    if(m[ry][rx] === WALL && (rx>3 || ry>3)) m[ry][rx] = DOT;
  }
  
  return m;
}

function initDots(){
  dots = [];
  for(let y=0;y<ROWS;y++){
    dots[y] = [];
    for(let x=0;x<COLS;x++){
      dots[y][x] = (maze[y][x] === DOT) ? DOT : EMPTY;
    }
  }
  // Add power pellets in corners
  const corners = [[2,2],[COLS-3,2],[2,ROWS-3],[COLS-3,ROWS-3]];
  for(const [cx,cy] of corners){
    if(dots[cy] && dots[cy][cx] === DOT){ dots[cy][cx] = POWER; }
  }
}

function initGhosts(){
  ghosts = [];
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  const colors = ['#ff6b6b','#48dbfb','#ff9ff3','#feca57'];
  const emojis = ['😡','😏','🤖','😴'];
  const count = Math.min(1 + Math.floor(level/5), 4);
  
  for(let i=0;i<count;i++){
    ghosts.push({
      x: cx + (i%2), y: cy + Math.floor(i/2),
      dir: {x:0,y:0},
      color: colors[i],
      emoji: emojis[i],
      speed: 0.12 + level * 0.015 + Math.random() * 0.05,
      scared: false, scaredT: 0,
      mode: Math.min(Math.floor(level/10), 2)
    });
  }
}

// ===== MOVEMENT HELPERS =====
function free(x,y){ return x>=0 && x<COLS && y>=0 && y<ROWS && maze[y][x]!==WALL; }

function optionsFor(e){
  const opts = [[0,-1],[1,0],[0,1],[-1,0]];
  const valid = [];
  for(const [dx,dy] of opts){
    if(free(e.x+dx, e.y+dy)){
      // No 180 unless dead end
      if(dx===-e.dir.x && dy===-e.dir.y && (e.dir.x!==0||e.dir.y!==0)){
        const others = opts.filter(([ox,oy])=>!(ox===dx&&oy===dy)&&free(e.x+ox,e.y+oy));
        if(others.length>0) continue;
      }
      valid.push({dx,dy});
    }
  }
  return valid;
}

function step(e){
  const opts = optionsFor(e);
  if(!opts.length) return false;
  
  let choice = null;
  // Try queued direction first
  if(e.next.x!==0||e.next.y!==0){
    choice = opts.find(o=>o.dx===e.next.x&&o.dy===e.next.y);
    e.next.x=0; e.next.y=0;
  }
  // Continue current
  if(!choice && (e.dir.x!==0||e.dir.y!==0)){
    choice = opts.find(o=>o.dx===e.dir.x&&o.dy===e.dir.y);
  }
  // Random fallback
  if(!choice){
    choice = opts[Math.floor(Math.random()*opts.length)];
  }
  
  e.dir = choice;
  e.x += choice.dx;
  e.y += choice.dy;
  return true;
}

// ===== GAME LOGIC =====
function moveHero(){
  step(hero);
  hero.mouth = (hero.mouth + 0.2) % (Math.PI*2);
  
  const d = dots[hero.y]?.[hero.x];
  if(d === DOT){
    dots[hero.y][hero.x] = EMPTY;
    score += 10;
    document.getElementById('score').textContent = score;
  } else if(d === POWER){
    dots[hero.y][hero.x] = EMPTY;
    score += 50;
    document.getElementById('score').textContent = score;
    ghosts.forEach(g=>{ g.scared = true; g.scaredT = 240; });
  }
  
  checkClear();
}

function moveGhost(g){
  g.scaredT = Math.max(0, (g.scaredT||0) - 1);
  if(g.scaredT === 0) g.scared = false;
  
  // Re-evaluate at intersections
  const opts = optionsFor(g);
  if(!opts.length) return;
  
  // Decide on junction (available dirs > 2, or forced turn)
  const forced = opts.length <= 2;
  const rethink = forced || Math.random() < 0.35;
  
  if(rethink){
    let choice = null;
    if(g.scared){
      // Run from hero
      let best = -Infinity;
      for(const o of opts){
        const dx = (g.x+o.dx)-hero.x, dy = (g.y+o.dy)-hero.y;
        const d2 = dx*dx+dy*dy + Math.random()*20;
        if(d2 > best){ best=d2; choice=o; }
      }
    } else if(g.mode === 0){
      // Random
      choice = opts[Math.floor(Math.random()*opts.length)];
    } else if(g.mode === 1){
      // Chase
      let best = Infinity;
      for(const o of opts){
        const dx = hero.x-(g.x+o.dx), dy = hero.y-(g.y+o.dy);
        const d2 = dx*dx+dy*dy + Math.random()*40;
        if(d2 < best){ best=d2; choice=o; }
      }
    } else {
      // Ambush
      let best = Infinity;
      for(const o of opts){
        const nx=g.x+o.dx, ny=g.y+o.dy;
        const futureX = nx + (hero.x-nx)*0.6, futureY = ny + (hero.y-ny)*0.6;
        const d2 = Math.abs(hero.x-futureX)+Math.abs(hero.y-futureY);
        if(d2 < best){ best=d2; choice=o; }
      }
    }
    if(choice) g.dir = choice;
  }
  
  step(g);
}

function collisions(){
  for(const g of ghosts){
    if(Math.abs(g.x-hero.x) < 0.7 && Math.abs(g.y-hero.y) < 0.7){
      if(g.scared){
        // Eat ghost
        g.x = Math.floor(COLS/2); g.y = Math.floor(ROWS/2);
        g.scared = false; g.scaredT = 0;
        score += 200;
        document.getElementById('score').textContent = score;
      } else {
        lives--;
        document.getElementById('lives').textContent = lives;
        if(lives <= 0){ triggerOver(); } else { resetPos(); }
      }
    }
  }
}

function checkClear(){
  let remaining = 0;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){ if(dots[y][x]!==EMPTY) remaining++; }
  if(remaining === 0){
    setTimeout(()=>{
      level++;
      document.getElementById('level').textContent = level;
      initLevel();
    }, 600);
  }
}

function triggerOver(){
  over = true; running = false;
  document.getElementById('overText').textContent = `關卡 ${level} · 得分 ${score}${best>0?' (最佳:'+best+')':''}`;
  document.getElementById('over').classList.remove('hidden');
  if(score > best){
    best = score;
    try { localStorage.setItem('mk99_best', best); } catch(e){}
  }
}

function resetPos(){
  hero.x = 1; hero.y = 1; hero.dir = {x:0,y:0}; hero.next = {x:0,y:0};
  const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  ghosts.forEach(g=>{ g.x=cx; g.y=cy; g.dir={x:0,y:0}; g.scared=false; g.scaredT=0; });
}

function initLevel(){
  maze = generateMaze();
  initDots();
  resetPos();
  over = false; running = true; paused = false;
}

// ===== RENDERING =====
function draw(){
  ctx.fillStyle = '#0f0f3a';
  ctx.fillRect(0, 0, W, H);
  
  if(!maze.length) return;
  
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const px = OX + x*CELL, py = OY + y*CELL;
      if(maze[y][x] === WALL){
        ctx.fillStyle = '#1a1a5c';
        ctx.fillRect(px, py, CELL, CELL);
      } else if(dots[y][x] === DOT){
        ctx.fillStyle = '#ffd166';
        ctx.beginPath();
        ctx.arc(px+CELL/2, py+CELL/2, CELL*0.12, 0, Math.PI*2);
        ctx.fill();
      } else if(dots[y][x] === POWER){
        ctx.fillStyle = '#ff6b81';
        ctx.beginPath();
        ctx.arc(px+CELL/2, py+CELL/2, CELL*0.28, 0, Math.PI*2);
        ctx.fill();
        // Pulsing glow
        ctx.strokeStyle = 'rgba(255,107,129,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px+CELL/2, py+CELL/2, CELL*0.35+Math.sin(tick*0.1)*2, 0, Math.PI*2);
        ctx.stroke();
      }
    }
  }
  
  // Draw ghosts
  for(const g of ghosts){
    const px = OX + g.x*CELL + CELL/2;
    const py = OY + g.y*CELL + CELL/2;
    const r = CELL*0.4;
    ctx.save();
    ctx.translate(px, py);
    
    // Scared color
    const color = g.scared ? '#6b6bff' : g.color;
    
    // Ghost body (dome top, wavy bottom)
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -r*0.1, r, Math.PI, 0);
    ctx.lineTo(r, r);
    // Wavy skirt
    const waves = 3;
    for(let i=0;i<waves;i++){
      const wx1 = r - (i+1)*(2*r/waves);
      const wx2 = r - (i+0.5)*(2*r/waves);
      ctx.lineTo(wx2, r - Math.sin(tick*0.15+i)*r*0.15);
      ctx.lineTo(wx1, r);
    }
    ctx.closePath();
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#fff';
    const eyeOff = r*0.3, eyeY = -r*0.25;
    ctx.beginPath(); ctx.arc(-eyeOff, eyeY, r*0.22, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeOff, eyeY, r*0.22, 0, Math.PI*2); ctx.fill();
    
    // Pupils
    const pdx = g.dir.x*r*0.15, pdy = g.dir.y*r*0.15;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-eyeOff+pdx, eyeY+pdy, r*0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeOff+pdx, eyeY+pdy, r*0.1, 0, Math.PI*2); ctx.fill();
    
    ctx.restore();
  }
  
  // Draw hero
  const hx = OX + hero.x*CELL + CELL/2;
  const hy = OY + hero.y*CELL + CELL/2;
  const hr = CELL*0.42;
  ctx.save();
  ctx.translate(hx, hy);
  
  // Glow
  const glow = ctx.createRadialGradient(0,0,hr*0.3,0,0,hr*1.6);
  glow.addColorStop(0, 'rgba(255,209,102,0.3)');
  glow.addColorStop(1, 'rgba(255,209,102,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(0,0,hr*1.6,0,Math.PI*2); ctx.fill();
  
  // Pac-Man body (animated mouth)
  ctx.fillStyle = '#ffd166';
  ctx.beginPath();
  const mouthAngle = Math.abs(Math.sin(hero.mouth)) * 0.35;
  const dirAngle = Math.atan2(hero.dir.y, hero.dir.x) + Math.PI/2;
  ctx.arc(0, 0, hr, dirAngle + mouthAngle, dirAngle + Math.PI*2 - mouthAngle);
  ctx.lineTo(0,0);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

// ===== RESIZE =====
function resize(){
  const wrap = document.getElementById('wrap');
  const rect = wrap.getBoundingClientRect();
  W = Math.floor(rect.width);
  H = Math.floor(rect.height);
  if(W < 100) W = 320;
  if(H < 100) H = 300;
  
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  
  // Fit maze in viewport minus header/footer
  constavailW = W - 16;
  const availH = H - 16;
  const maxCellW = Math.floor(availW / COLS);
  const maxCellH = Math.floor(availH / ROWS);
  CELL = Math.max(10, Math.min(36, maxCellW, maxCellH));
  
  OX = Math.floor((W - COLS*CELL)/2);
  OY = Math.floor((H - ROWS*CELL)/2);
}
window.addEventListener('resize', resize);

// ===== INPUT =====
function queueDir(dx,dy){
  hero.next.x = dx; hero.next.y = dy;
}

document.addEventListener('keydown', e=>{
  if(!running || paused || over) return;
  switch(e.key){
    case'ArrowLeft': case'a': queueDir(-1,0); break;
    case'ArrowRight': case'd': queueDir(1,0); break;
    case'ArrowUp': case'w': queueDir(0,-1); break;
    case'ArrowDown': case's': queueDir(0,1); break;
  }
});

document.getElementById('mL').addEventListener('touchstart', e=>{e.preventDefault();queueDir(-1,0)});
document.getElementById('mR').addEventListener('touchstart', e=>{e.preventDefault();queueDir(1,0)});
document.getElementById('mU').addEventListener('touchstart', e=>{e.preventDefault();queueDir(0,-1)});
document.getElementById('mD').addEventListener('touchstart', e=>{e.preventDefault();queueDir(0,1)});

document.getElementById('pauseBtn').addEventListener('click', ()=>{
  if(!running) return;
  paused = !paused;
  document.getElementById('pause').classList.toggle('hidden', !paused);
});

document.getElementById('go').addEventListener('click', ()=>{
  const name = document.getElementById('name').value.trim();
  if(!name){ document.getElementById('name').style.borderColor='#e94560'; return; }
  document.getElementById('start').classList.add('hidden');
  initLevel();
  resize();
  loop();
});

document.getElementById('resume').addEventListener('click', ()=>{
  paused = false;
  document.getElementById('pause').classList.add('hidden');
});

document.getElementById('restart').addEventListener('click', ()=>{
  document.getElementById('pause').classList.add('hidden');
  score = 0; lives = 3; level = 1;
  document.getElementById('score').textContent = '0';
  document.getElementById('lives').textContent = '3';
  document.getElementById('level').textContent = '1';
  initLevel();
  resize();
});

document.getElementById('retry').addEventListener('click', ()=>{
  document.getElementById('over').classList.add('hidden');
  score = 0; lives = 3; level = 1;
  document.getElementById('score').textContent = '0';
  document.getElementById('lives').textContent = '3';
  document.getElementById('level').textContent = '1';
  initLevel();
  resize();
});

document.getElementById('helpBtn').addEventListener('click', ()=>{
  alert('操作說明\n\n• 鍵盤方向鍵 / WASD 控制\n• 底部按鈕控制方向\n• 滑動無效，請用按鈕或鍵盤\n• 吃所有豆仔過關\n• 大能量豆可反擊 ghost\n• Ghost 會隨關卡變聰明');
});

// ===== GAME LOOP =====
let lastMove = 0;

function loop(ts){
  if(running && !over && !paused){
    tick++;
    
    // Hero moves every N ms
    const heroInterval = Math.max(80, 180 - level*5);
    if(ts - lastMove > heroInterval){
      moveHero();
      lastMove = ts;
    }
    
    // Ghosts move independently
    for(const g of ghosts){
      const gi = Math.floor(1000 / (g.speed * 1000));
      if(tick % Math.max(1, gi) === 0) moveGhost(g);
    }
    
    collisions();
  }
  
  draw();
  requestAnimationFrame(loop);
}

// Initial render
resize();
draw();
requestAnimationFrame(loop);
</script>
</body>
</html>
