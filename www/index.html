<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a2e">
<title>色彩配對 Color Match</title>
<style>
*{-webkit-tap-highlight-color:transparent;user-select:none;box-sizing:border-box}
html,body{margin:0;padding:0;background:#0a0a2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;overflow:hidden;height:100%;width:100%;position:fixed;inset:0}
#app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto;background:radial-gradient(1200px 500px at 50% -10%,#1a1a5c,#0a0a2e 70%)}
#header{display:flex;gap:8px;padding:8px 12px;flex-shrink:0;position:relative;z-index:10}
.card{flex:1;background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.14);border-radius:14px;padding:6px 8px;text-align:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.card .l{font-size:9px;letter-spacing:0.14em;color:rgba(255,255,255,0.6);font-weight:800;text-transform:uppercase}
.card .v{font-size:18px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
#wrap{flex:1;position:relative;overflow:hidden;touch-action:none;margin:0 8px 8px;border-radius:16px;background:linear-gradient(180deg,#0f0f3a,#1a1a5c)}
canvas{display:block;width:100%;height:100%}
#overlays{position:fixed;inset:0;z-index:200;background:rgba(10,10,46,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease-out}
#overlays.hidden{display:none}
.modal{background:linear-gradient(180deg,rgba(255,255,255,0.18),rgba(255,255,255,0.07));border:1px solid rgba(255,255,255,0.24);border-radius:26px;padding:28px 24px;width:100%;max-width:360px;text-align:center;box-shadow:0 28px 64px rgba(0,0,0,0.85);animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
.modal h1{margin:0 0 6px;font-size:32px;font-weight:900;background:linear-gradient(135deg,#fff,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 6px 18px rgba(255,209,102,0.4))}
.modal h2{margin:0 0 18px;font-size:12px;font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:0.22em;text-transform:uppercase}
.inp{width:100%;padding:13px 14px;border-radius:14px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:16px;font-weight:700;margin-bottom:14px;outline:none;transition:border-color .2s,transform .1s}
.inp::placeholder{color:rgba(255,255,255,0.35)}
.inp:focus{border-color:#ffd166;transform:scale(1.02)}
.btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#e94560,#ff6b81);color:#fff;font-size:15px;font-weight:900;letter-spacing:0.1em;margin-bottom:10px;cursor:pointer;box-shadow:0 14px 32px rgba(233,69,96,0.55);transition:transform .1s,box-shadow .2s}
.btn:active{transform:scale(0.97);box-shadow:0 8px 18px rgba(233,69,96,0.4)}
.btn.line{background:transparent;border:2px solid rgba(255,255,255,0.28);box-shadow:none;color:#fff}
.info{margin:16px 0 8px;font-size:12px;color:rgba(255,255,255,0.65);line-height:1.7}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="card"><div class="l">得分</div><div class="v" id="score">0</div></div>
    <div class="card"><div class="l">目標</div><div class="v" id="target">500</div></div>
    <div class="card"><div class="l">步數</div><div class="v" id="moves">20</div></div>
    <div class="card"><div class="l">關卡</div><div class="v" id="lvl">1</div></div>
  </div>
  <div id="wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<div id="overlays">
  <div class="modal">
    <h1>色彩配對</h1>
    <h2>COLOR MATCH</h2>
    <input type="text" id="name" class="inp" placeholder="玩家名稱" maxlength="10" value="玩家">
    <button class="btn" id="go">開始遊戲</button>
    <button class="btn line" id="help">📖 操作說明</button>
    <p class="info">滑動交換相鄰寶石<br>3 個同色連成線即消除<br>連鎖 Combo 加分更多<br>用有限步數達到目標分數</p>
  </div>
</div>

<div id="end" class="hidden" style="position:fixed;inset:0;z-index:250;background:rgba(10,10,46,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:none;align-items:center;justify-content:center;padding:20px">
  <div class="modal">
    <h1 id="endTitle"></h1>
    <p id="endText" style="margin:14px 0;color:rgba(255,255,255,0.9);font-size:14px;line-height:1.8"></p>
    <button class="btn" id="retry">再玩一次</button>
  </div>
</div>

<script>
"use strict";
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W=0,H=0;

// ===== CONFIG =====
const COLS=8,ROWS=8;
const GOAL_BASE=500;
const MOVES_BASE=22;
const GEM_COUNT=6;

const GEMS=[
  {name:'紅',hex:'#ff4757',hi:'#ff6b81'},
  {name:'藍',hex:'#3742fa',hi:'#535dff'},
  {name:'綠',hex:'#2ed573',hi:'#5ae992'},
  {name:'黃',hex:'#ffa502',hi:'#ffbe33'},
  {name:'紫',hex:'#a55eea',hi:'#bb7ff0'},
  {name:'橙',hex:'#ff7f50',hi:'#ff9980'}
];

// ===== STATE =====
let board=[],sel=null,dragging=false,dragR=0,dragC=0,dx=0,dy=0;
let score=0,level=1,movesLeft=0,target=0,best=0;
let running=false,busy=false,over=false;
let particles=[],animQueue=[];
let tick=0;

try{best=parseInt(localStorage.getItem('match3v2_b')||'0',10)}catch(e){}

// ===== RESIZE =====
function resize(){
  const wrap=document.getElementById('wrap');
  const r=wrap.getBoundingClientRect();
  W=Math.floor(r.width);H=Math.floor(r.height);
  if(W<100)W=320;if(H<100)H=300;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);

// ===== BOARD =====
function emptyBoard(){
  const b=[];
  for(let r=0;r<ROWS;r++){b[r]=[];for(let c=0;c<COLS;c++)b[r][c]=-1}
  return b;
}

function fillBoard(){
  board=emptyBoard();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let id;
      do{id=Math.floor(Math.random()*GEM_COUNT)}
      while(badPlace(r,c,id));
      board[r][c]=id;
    }
  }
}

function badPlace(r,c,id){
  if(c>=2&&board[r][c-1]===id&&board[r][c-2]===id) return true;
  if(r>=2&&board[r-1]&&board[r-1][c]===id&&board[r-2]&&board[r-2][c]===id) return true;
  return false;
}

// ===== MATCH =====
function findMatches(){
  const m=new Set();
  for(let r=0;r<ROWS;r++){
    let c=0;
    while(c<COLS){
      const id=board[r][c];
      if(id<0){c++;continue}
      let e=c+1;
      while(e<COLS&&board[r][e]===id) e++;
      if(e-c>=3) for(let k=c;k<e;k++) m.add(r+','+k);
      c=e;
    }
  }
  for(let c=0;c<COLS;c++){
    let r=0;
    while(r<ROWS){
      const id=board[r][c];
      if(id<0){r++;continue}
      let e=r+1;
      while(e<ROWS&&board[e][c]===id) e++;
      if(e-r>=3) for(let k=r;k<e;k++) m.add(k+','+c);
      r=e;
    }
  }
  return [...m].map(s=>{const[a,b]=s.split(',');return[r=+a,c=+b]});
}

function matchesAt(r,c){
  return findMatches().some(([mr,mc])=>mr===r&&mc===c);
}

// ===== RESOLVE =====
function doResolve(){
  const matches=findMatches();
  if(!matches.length){checkEnd();return}

  const len=matches.length;
  const combo=++animQueue.combo||1;

  // Score
  const pts=len*10*combo;
  score+=pts;
  document.getElementById('score').textContent=score;

  // Animate pop + particles
  const cs=cellSize();
  const gx=gridX(),gy=gridY();
  for(const[r,c]of matches){
    const px=gx+c*cs+cs/2, py=gy+r*cs+cs/2;
    particles.push(...Array.from({length:8},()=>{
      const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
      return{x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color:GEMS[board[r][c]].hex,size:2+Math.random()*2}
    }));
    animQueue.push({r,c,phase:'pop',t:0,max:14});
    board[r][c]=-1;
  }

  // Drop
  for(let c=0;c<COLS;c++){
    let wr=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(board[r][c]>=0){
        if(r!==wr){
          board[wr][c]=board[r][c];
          board[r][c]=-1;
          animQueue.push({r:wr,c,phase:'drop',fromR:r,t:0,max:12});
        }
        wr--;
      }
    }
    for(let r=wr;r>=0;r--){
      board[r][c]=Math.floor(Math.random()*GEM_COUNT);
      animQueue.push({r,c,phase:'enter',t:0,max:12});
    }
  }

  setTimeout(doResolve,180);
}

function checkEnd(){
  busy=false;
  if(score>=target){
    level++;
    target=GOAL_BASE*level;
    movesLeft+=4;
    document.getElementById('target').textContent=target;
    document.getElementById('moves').textContent=movesLeft;
    showEnd('🎉 關卡完成！',`得分：${score}\n下一關目標：${target}`);
    over=true;running=false;
  }else if(movesLeft<=0){
    showEnd('😢 GAME OVER',`得分：${score} / 目標：${target}\n相差：${target-score}`);
    over=true;running=false;
  }
  if(score>best){best=score;try{localStorage.setItem('match3v2_b',best)}catch(e){}}
}

// ===== SWAP =====
function trySwap(r1,c1,r2,c2){
  if(busy) return;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return;
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
  if(findMatches().length){
    busy=true;
    movesLeft--;
    document.getElementById('moves').textContent=movesLeft;
    checkEnd();
    doResolve();
  }else{
    [board[r2][c2],board[r1][c1]]=[board[r1][c1],board[r2][c2]];
  }
  sel=null;
}

// ===== INPUT =====
function cellAt(x,y){
  const cs=cellSize(),gx=gridX(),gy=gridY();
  const c=Math.floor((x-gx)/cs),r=Math.floor((y-gy)/cs);
  if(r<0||r>=ROWS||c<0||c>=COLS) return null;
  return{r,c};
}

let touchOrigin=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],rc=canvas.getBoundingClientRect();
  const p=cellAt(t.clientX-rc.left,t.clientY-rc.top);
  if(!p||!running||over||busy) return;
  touchOrigin=p;dragging=true;dragR=p.r;dragC=p.c;dx=0;dy=0;
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!dragging||!touchOrigin) return;
  const t=e.touches[0],rc=canvas.getBoundingClientRect();
  const x=t.clientX-rc.left,y=t.clientY-rc.top;
  const cs=cellSize(),gx=gridX(),gy=gridY();
  const cx=gx+touchOrigin.c*cs+cs/2, cy=gy+touchOrigin.r*cs+cs/2;
  dx=x-cx;dy=y-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>cs*0.35){
    let tr=touchOrigin.r,tc=touchOrigin.c;
    if(Math.abs(dx)>Math.abs(dy)) tc+=dx>0?1:-1;
    else tr+=dy>0?1:-1;
    if(tr>=0&&tr<ROWS&&tc>=0&&tc<COLS){
      dragging=false;touchOrigin=null;
      trySwap(touchOrigin.r,touchOrigin.c,tr,tc);
    }
  }
},{passive:false});

canvas.addEventListener('touchend',()=>{dragging=false;touchOrigin=null});

canvas.addEventListener('mousedown',e=>{
  const rc=canvas.getBoundingClientRect();
  const p=cellAt(e.clientX-rc.left,e.clientY-rc.top);
  if(!p||!running||over||busy) return;
  touchOrigin=p;dragging=true;dragR=p.r;dragC=p.c;dx=0;dy=0;
});
canvas.addEventListener('mousemove',e=>{
  if(!dragging||!touchOrigin) return;
  const rc=canvas.getBoundingClientRect();
  const x=e.clientX-rc.left,y=e.clientY-rc.top;
  const cs=cellSize(),gx=gridX(),gy=gridY();
  const cx=gx+touchOrigin.c*cs+cs/2,cy=gy+touchOrigin.r*cs+cs/2;
  dx=x-cx;dy=y-cy;
});
canvas.addEventListener('mouseup',e=>{
  if(!dragging||!touchOrigin) return;
  const rc=canvas.getBoundingClientRect();
  const x=e.clientX-rc.left,y=e.clientY-rc.top;
  const cs=cellSize();
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<cs*0.35){
    // Tap to select (second tap on adjacent = swap)
    if(sel){
      const dr=Math.abs(sel.r-touchOrigin.r),dc=Math.abs(sel.c-touchOrigin.c);
      if(dr+dc===1){trySwap(sel.r,sel.c,touchOrigin.r,touchOrigin.c);return}
    }
    sel={r:touchOrigin.r,c:touchOrigin.c};
  }
  dragging=false;touchOrigin=null;dx=0;dy=0;
});

document.getElementById('go').onclick=()=>{
  const n=document.getElementById('name').value.trim();
  if(!n){document.getElementById('name').style.borderColor='#e94560';return}
  document.getElementById('name').style.borderColor='rgba(255,255,255,0.25)';
  document.getElementById('overlays').classList.add('hidden');
  startGame();
};

document.getElementById('retry').onclick=()=>{
  document.getElementById('end').classList.add('hidden');
  document.getElementById('end').style.display='none';
  startGame();
};

document.getElementById('help').onclick=()=>{
  alert('操作說明\n\n• 手機：滑動交換相鄰寶石\n• 電腦：滑鼠拖曳或點一下選、再點鄰近交換\n• 3 個同色連線消除\n• Combo 連鎖會加分\n• Limited moves，目標達到分數\n• 步數用完前未達到就失敗');
};

// ===== GAME FLOW =====
function startGame(){
  resize();
  fillBoard();
  score=0;
  movesLeft=MOVES_BASE+(level-1)*2;
  target=GOAL_BASE*level;
  over=false;running=true;busy=false;sel=null;
  particles=[];animQueue=[];
  document.getElementById('score').textContent='0';
  document.getElementById('moves').textContent=movesLeft;
  document.getElementById('target').textContent=target;
  document.getElementById('lvl').textContent=level;
  document.getElementById('end').classList.add('hidden');
  document.getElementById('end').style.display='none';
  loop();
}

function showEnd(title,text){
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endText').textContent=text;
  document.getElementById('end').classList.remove('hidden');
  document.getElementById('end').style.display='flex';
}

// ===== LAYOUT =====
function cellSize(){
  const pad=36;
  const cw=(W-pad*2)/COLS, ch=(H-pad*2-16)/ROWS;
  return Math.max(22,Math.min(64,cw,ch));
}
function gridX(){return Math.floor((W-COLS*cellSize())/2)}
function gridY(){return Math.floor((H-ROWS*cellSize())/2)+16}

// ===== RENDER =====
function draw(){
  ctx.fillStyle='#0f0f3a';ctx.fillRect(0,0,W,H);

  const cs=cellSize(),gx=gridX(),gy=gridY();

  // Board shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.roundRect(gx-6,gy-6,COLS*cs+12,ROWS*cs+12,18);
  ctx.fill();

  // Gems
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=gx+c*cs,y=gy+r*cs;
      const id=board[r][c];
      if(id<0){ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(x+1,y+1,cs-2,cs-2);continue}

      let offX=0,offY=0,sc=1,alpha=1;
      const a=animQueue.find(a=>a.r===r&&a.c===c);
      if(a){
        if(a.phase==='pop'){
          sc=1-Math.abs(a.t-a.max/2)/(a.max/2)*0.9;
          alpha=1-a.t/a.max;
        }else if(a.phase==='drop'){
          const p=a.t/a.max;
          offY=(a.fromR-r)*cs*(1-p);
          sc=0.5+0.5*p;
        }else if(a.phase==='enter'){
          sc=a.t/a.max;
          offY=(1-sc)*cs*0.5;
        }
        a.t++;
        if(a.t>a.max) animQueue=animQueue.filter(q=>q!==a);
      }

      // Selection
      if(sel&&sel.r===r&&sel.c===c&&running&&!over){
        ctx.strokeStyle='rgba(255,255,255,0.95)';ctx.lineWidth=3;
        ctx.shadowColor='rgba(255,255,255,0.8)';ctx.shadowBlur=12;
        ctx.beginPath();
        ctx.roundRect(x+2,y+2,cs-4,cs-4,8);
        ctx.stroke();
        ctx.shadowBlur=0;
      }

      ctx.save();
      ctx.globalAlpha=Math.max(0,alpha);
      ctx.translate(x+cs/2+offX,y+cs/2+offY);
      ctx.scale(sc,sc);

      const gem=GEMS[id];
      const pad=cs*0.14, size=cs/2-pad;

      // Glow
      const glow=ctx.createRadialGradient(0,0,size*0.2,0,0,size*1.4);
      glow.addColorStop(0,gem.hi+'55');
      glow.addColorStop(1,gem.hi+'00');
      ctx.fillStyle=glow;
      ctx.beginPath();ctx.arc(0,0,size*1.4,0,Math.PI*2);ctx.fill();

      // Body
      const grad=ctx.createRadialGradient(-size*0.3,-size*0.3,0,0,0,size*1.3);
      grad.addColorStop(0,gem.hi);
      grad.addColorStop(1,gem.hex);
      ctx.fillStyle=grad;
      ctx.beginPath();
      const rad=size*0.28;
      ctx.roundRect(-size,-size,size*2,size*2,rad);
      ctx.fill();

      // Shine
      ctx.fillStyle='rgba(255,255,255,0.38)';
      ctx.beginPath();
      ctx.ellipse(-size*0.25,-size*0.25,size*0.38,size*0.28,Math.PI/4,0,Math.PI*2);
      ctx.fill();

      ctx.restore();
    }
  }

  // Drag visual
  if(dragging&&touchOrigin){
    const cs=cellSize(),gx=gridX(),gy=gridY();
    const ox=gx+touchOrigin.c*cs+cs/2,oy=gy+touchOrigin.r*cs+cs/2;
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+dx,oy+dy);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life-=0.028;
    if(p.life<=0){particles.splice(i,1);continue}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ===== LOOP =====
function loop(){
  tick++;
  if(running||particles.length) draw();
  if(running||animQueue.length||particles.length) requestAnimationFrame(loop);
}

// Init
resize();
fillBoard();
draw();
</script>
</body>
</html>
